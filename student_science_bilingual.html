<!DOCTYPE html>
<html lang="zh-TW" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Science | 科學雙語閱讀</title>

<script src="./assets/js/aischool-tts.js"></script>
<script src="./assets/js/learning-analytics.js"></script>

    window.AISchool.requireRole(["student"], "請先登入學生帳號，再使用科學雙語閱讀。", "index.html");
</script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'Noto Sans TC', 'sans-serif'],
                        heading: ['Noto Sans TC', 'sans-serif'],
                    },
                    colors: {
                        student: {
                            bg: '#0B1121',       /* 深宇宙藍 */
                            card: '#1E293B',     /* 卡片底色 */
                            english: '#4ade80',  /* 螢光薄荷綠 */
                            highlight: '#f472b6',/* 亮桃紅 */
                            term: '#fbbf24'      /* 金黃色 */
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* 1. 基礎設定 */
        body { 
            background-color: #0B1121; 
            color: #f1f5f9; 
            overflow: hidden; 
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        /* 柔和的極光背景 */
        body::before {
            content: '';
            position: fixed; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle at 50% 50%, rgba(30, 58, 138, 0.15), transparent 60%);
            z-index: -2; pointer-events: none;
        }

        /* 2. 圓潤的玻璃卡片 - 基礎類 */
        .glass-panel { 
            backdrop-filter: blur(16px); 
            -webkit-backdrop-filter: blur(16px); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2); 
            border-radius: 1.5rem; 
        }

        /* [Visual] 區塊顏色區分 */
        .panel-left { background: rgba(15, 23, 42, 0.7); } /* 較深的藍色 (Menu) */
        .panel-center { background: rgba(30, 41, 59, 0.6); } /* 標準透光 (Content) */
        .panel-right { background: rgba(30, 27, 75, 0.5); } /* 帶一點紫的深色 (Vocab) */

        /* 捲軸美化 */
        .scroll-area::-webkit-scrollbar { width: 6px; }
        .scroll-area::-webkit-scrollbar-track { background: transparent; }
        .scroll-area::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.15); border-radius: 99px; }
        .scroll-area::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.3); }

        /* 3. 導航選單 (側邊欄) */
        .nav-item { 
            transition: all 0.2s ease; 
            cursor: pointer; 
            padding: 1rem 1.2rem; 
            margin-bottom: 0.5rem; 
            font-size: 1rem; 
            color: #94a3b8; 
            border-radius: 1rem;
            font-weight: 500;
            display: flex; align-items: center;
        }
        .nav-item:hover { 
            background: rgba(255, 255, 255, 0.05); 
            color: #fff; 
            transform: translateX(4px);
        }
        .nav-item.active { 
            background: linear-gradient(90deg, rgba(74, 222, 128, 0.15), transparent); 
            color: #4ade80; 
            font-weight: 700; 
            box-shadow: inset 3px 0 0 #4ade80; 
        }

        /* 4. 科學詞彙 */
        .sci-term { 
            color: #fbbf24; 
            font-weight: 700; 
            border-bottom: 2px dashed rgba(251, 191, 36, 0.4); 
            cursor: pointer; 
            transition: all 0.2s; 
            padding: 0 4px; 
            border-radius: 4px;
        }
        .sci-term:hover { 
            background-color: rgba(251, 191, 36, 0.2); 
            color: #fff; 
            border-bottom-color: transparent;
            transform: scale(1.05);
            display: inline-block;
        }

        /* 5. 閱讀區塊 (排版優化) */
        .content-block { 
            margin-bottom: 3rem; /* 增加區塊間距 */
            padding: 1.5rem; 
            border-radius: 1.5rem; 
            background: transparent; 
            border: 1px solid transparent; 
            transition: all 0.3s ease; 
            display: flex; 
            flex-direction: column; 
            gap: 1.25rem; /* [排版] 增加中英文之間的距離 */
        }
        
        /* 🎯 正在朗讀的高亮 (桃紅系) */
        .reading-active {
            background: linear-gradient(90deg, rgba(244, 114, 182, 0.08) 0%, rgba(244, 114, 182, 0.15) 50%, rgba(244, 114, 182, 0.08) 100%) !important;
            border-left: 6px solid #f472b6 !important; 
            border-radius: 0.5rem 1.5rem 1.5rem 0.5rem;
            transform: scale(1.01);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
        }
        .reading-active .zh-text,
        .reading-active .en-text,
        .reading-active .sci-term,
        .reading-active .section-title-text { /* 包含標題文字 */
            color: #f472b6 !important;
            text-shadow: 0 0 10px rgba(244, 114, 182, 0.4);
            border-bottom-color: transparent;
        }

        /* 6. 字體排版 (優化閱讀感) */
        .en-text { 
            font-size: 1.3rem; /* [排版] 稍微加大英文 */
            color: #4ade80; 
            line-height: 1.7; 
            font-weight: 500; 
            font-family: 'Inter', sans-serif; 
            cursor: pointer; 
            transition: color 0.3s;
        }
        .en-text:hover { opacity: 0.9; color: #fff; }

        /* [修改] 中文文字區塊：改回純文字版閱讀節奏 */
        .zh-text { 
            font-size: 1.35rem; /* 稍微加大 */
            color: #e2e8f0;     
            line-height: 1.95;
            letter-spacing: 0.08em; 
            padding-left: 0;    
            cursor: pointer; 
            font-weight: 400; 
            transition: color 0.3s;
            text-align: justify; 
        }
        .zh-text:hover { color: #f472b6; }

        /* [排版] 章節標題優化 */
        .section-header { 
            margin-top: 4rem; 
            margin-bottom: 2.5rem; 
            padding: 1rem 1.5rem;
            border-radius: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05); /* 改為更輕微的底線 */
            background: rgba(255,255,255,0.02); /* 極淡的背景凸顯 */
            display: flex; 
            align-items: flex-start; 
            gap: 1rem; 
            transition: all 0.3s;
        }
        /* [排版] 標題左側裝飾線加強 */
        .section-header::before { 
            content: ''; display: block; width: 6px; height: 100%; min-height: 40px;
            background: #4ade80; border-radius: 99px; 
            box-shadow: 0 0 15px rgba(74, 222, 128, 0.4); /* 增加光暈 */
            margin-top: 4px;
        }
        .section-title-text {
            font-size: 1.8rem;
            font-weight: 900;
            color: #fff;
            line-height: 1.4;
            cursor: pointer;
        }
        .caption-block {
            margin: 1.1rem 0 2rem;
            padding: 0.85rem 1rem;
            border-radius: 0.75rem;
            background: rgba(15, 23, 42, 0.34);
            border: 1px solid rgba(148, 163, 184, 0.18);
            border-left: 4px solid rgba(56, 189, 248, 0.78);
            display: grid;
            grid-template-columns: 1.5rem minmax(0, 1fr);
            column-gap: 0.75rem;
            row-gap: 0.25rem;
            align-items: start;
            transition: all 0.3s ease;
        }
        .caption-block.table-caption {
            border-left-color: rgba(251, 191, 36, 0.78);
        }
        .caption-icon {
            color: #38bdf8;
            line-height: 1.7;
            font-size: 0.92rem;
            opacity: 0.9;
            text-align: center;
            padding-top: 0.15rem;
        }
        .table-caption .caption-icon {
            color: #fbbf24;
        }
        .caption-block .zh-text {
            font-size: 1rem;
            line-height: 1.75;
            color: #cbd5e1;
            letter-spacing: 0.03em;
            text-align: left;
            font-weight: 500;
        }
        .caption-block .en-text {
            grid-column: 2;
            font-size: 0.95rem;
            line-height: 1.6;
            color: #86efac;
            font-weight: 500;
        }

        .reader-shell {
            max-width: min(72rem, 100%);
        }

        #article-title {
            margin-bottom: 1.5rem;
            letter-spacing: 0;
        }
        #article-title #title-zh {
            font-size: clamp(2rem, 5vw, 3.4rem);
            line-height: 1.18;
        }
        #article-title #title-en {
            font-size: clamp(1.05rem, 2.4vw, 1.6rem);
            line-height: 1.45;
        }

        .reading-dashboard {
            margin: 0 auto 2rem;
            max-width: 62rem;
            padding: 1rem 1.1rem;
            border-radius: 1rem;
            border: 1px solid rgba(148, 163, 184, 0.18);
            background: rgba(15, 23, 42, 0.48);
        }
        .reading-progress-track {
            height: 0.45rem;
            overflow: hidden;
            border-radius: 999px;
            background: rgba(15, 23, 42, 0.85);
            border: 1px solid rgba(148, 163, 184, 0.18);
        }
        .reading-progress-fill {
            width: 0%;
            height: 100%;
            border-radius: inherit;
            background: linear-gradient(90deg, #22c55e, #38bdf8);
            transition: width 0.25s ease;
        }
        .reading-stat {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            color: #cbd5e1;
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.02em;
        }
        .reading-stat i {
            color: #4ade80;
            font-size: 0.86rem;
        }

        #article-content {
            max-width: 62rem;
            margin: 0 auto;
        }
        .content-block {
            max-width: 62rem;
            border-radius: 1rem;
            padding: 1.25rem 1.5rem;
            margin-bottom: 2.35rem;
        }
        .content-block:hover {
            background: rgba(15, 23, 42, 0.24);
            border-color: rgba(148, 163, 184, 0.14);
        }
        .section-header {
            max-width: 62rem;
            margin-left: auto;
            margin-right: auto;
        }
        .caption-block {
            max-width: 58rem;
            margin-left: auto;
            margin-right: auto;
        }

        .quick-check-panel {
            max-width: 62rem;
            margin: 2.75rem auto 0;
            padding: 1.25rem;
            border-radius: 1rem;
            border: 1px solid rgba(74, 222, 128, 0.22);
            background: linear-gradient(180deg, rgba(15, 23, 42, 0.66), rgba(15, 23, 42, 0.42));
        }
        .quick-check-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        .quick-check-title {
            display: flex;
            align-items: center;
            gap: 0.55rem;
            color: #f8fafc;
            font-size: 1.05rem;
            font-weight: 900;
        }
        .quick-check-title i {
            color: #4ade80;
        }
        .quick-check-score {
            color: #86efac;
            font-size: 0.8rem;
            font-weight: 800;
            white-space: nowrap;
        }
        .quick-check-list {
            display: grid;
            gap: 1rem;
        }
        .quick-check-item {
            padding: 1rem;
            border-radius: 0.9rem;
            background: rgba(15, 23, 42, 0.52);
            border: 1px solid rgba(148, 163, 184, 0.15);
        }
        .quick-check-stem {
            color: #e2e8f0;
            line-height: 1.75;
            font-weight: 700;
            white-space: pre-wrap;
        }
        .quick-check-options {
            display: grid;
            gap: 0.65rem;
            margin-top: 0.85rem;
        }
        .quick-check-option {
            display: flex;
            align-items: flex-start;
            gap: 0.65rem;
            width: 100%;
            min-height: 2.85rem;
            padding: 0.72rem 0.85rem;
            border-radius: 0.8rem;
            color: #dbeafe;
            text-align: left;
            border: 1px solid rgba(148, 163, 184, 0.18);
            background: rgba(30, 41, 59, 0.68);
            transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
        }
        .quick-check-option:hover:not(:disabled) {
            transform: translateY(-1px);
            border-color: rgba(74, 222, 128, 0.6);
            background: rgba(30, 41, 59, 0.95);
        }
        .quick-check-option:disabled {
            cursor: default;
        }
        .quick-check-letter {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex: 0 0 1.45rem;
            height: 1.45rem;
            border-radius: 999px;
            color: #0f172a;
            background: #86efac;
            font-size: 0.72rem;
            font-weight: 900;
        }
        .quick-check-option.is-correct {
            border-color: rgba(74, 222, 128, 0.95);
            background: rgba(22, 101, 52, 0.34);
        }
        .quick-check-option.is-wrong {
            border-color: rgba(248, 113, 113, 0.8);
            background: rgba(127, 29, 29, 0.28);
        }
        .quick-check-feedback {
            margin-top: 0.75rem;
            color: #cbd5e1;
            font-size: 0.9rem;
            line-height: 1.65;
        }
        .quick-check-empty {
            color: #94a3b8;
            text-align: center;
            padding: 1rem 0;
            font-weight: 700;
        }

        @media (max-width: 768px) {
            .reader-shell {
                max-width: 100%;
            }
            #article-title {
                margin-bottom: 1rem;
            }
            .reading-dashboard,
            #article-content,
            .quick-check-panel {
                max-width: 100%;
            }
            .reading-dashboard {
                padding: 0.9rem;
            }
            .content-block {
                padding: 1rem 0.9rem;
                margin-bottom: 1.8rem;
            }
            .zh-text {
                font-size: 1.12rem;
                line-height: 1.85;
                letter-spacing: 0.04em;
                text-align: left;
            }
            .en-text {
                font-size: 1rem;
                line-height: 1.62;
            }
            .section-title-text {
                font-size: 1.35rem;
            }
            .caption-block {
                grid-template-columns: 1.25rem minmax(0, 1fr);
                padding: 0.75rem;
            }
            .quick-check-header {
                flex-direction: column;
                gap: 0.4rem;
            }
            .quick-check-option {
                min-height: 3rem;
            }
        }

        /* Custom learning filters */
        .student-select-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            min-width: max-content;
            height: 42px;
            border-radius: 999px;
            border: 1px solid rgba(148, 163, 184, 0.18);
            background:
                linear-gradient(135deg, rgba(255, 255, 255, 0.09), rgba(15, 23, 42, 0.66)),
                rgba(15, 23, 42, 0.74);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06), 0 14px 32px rgba(2, 6, 23, 0.16);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: visible;
        }
        .student-select-wrapper:hover {
            transform: translateY(-1px);
            border-color: rgba(74, 222, 128, 0.58);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08), 0 18px 38px rgba(2, 6, 23, 0.24);
        }
        .student-select-wrapper.is-disabled {
            opacity: 0.56;
            transform: none;
            box-shadow: none;
        }
        .student-select-icon { 
            color: #4ade80; 
            font-size: 0.875rem; 
            margin-left: 14px;
            margin-right: 8px;
            pointer-events: none; 
        }
        .student-select {
            appearance: none;
            -webkit-appearance: none;
            position: absolute;
            inset: 0;
            opacity: 0;
            pointer-events: none;
            width: 100%;
            height: 100%;
        }
        .student-select-face {
            width: 100%;
            min-width: 0;
            height: 100%;
            display: inline-flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 0 13px 0 0;
            border: 0;
            background: transparent;
            color: #f8fafc;
            cursor: pointer;
            font-size: 0.86rem;
            font-weight: 800;
            letter-spacing: 0;
            text-align: left;
        }
        .student-select-face:disabled {
            cursor: not-allowed;
        }
        .student-select-value {
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .student-select-caret {
            color: #94a3b8;
            font-size: 0.72rem;
            transition: transform 180ms ease, color 180ms ease;
            flex: 0 0 auto;
        }
        .student-select-wrapper.is-open .student-select-caret {
            color: #4ade80;
            transform: rotate(180deg);
        }
        .student-select-menu {
            position: fixed;
            z-index: 80;
            max-height: min(22rem, calc(100vh - 2rem));
            overflow: auto;
            padding: 0.45rem;
            border-radius: 1.05rem;
            border: 1px solid rgba(148, 163, 184, 0.28);
            background:
                linear-gradient(180deg, rgba(30, 41, 59, 0.98), rgba(15, 23, 42, 0.98)),
                #0f172a;
            box-shadow: 0 24px 70px rgba(2, 6, 23, 0.56);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            opacity: 0;
            pointer-events: none;
            transform: translateY(-6px) scale(0.98);
            transform-origin: top center;
            transition: opacity 150ms ease, transform 150ms ease;
        }
        .student-select-menu.is-open {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0) scale(1);
        }
        .student-select-option {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 0.55rem;
            min-height: 2.55rem;
            padding: 0.62rem 0.8rem;
            border: 0;
            border-radius: 0.72rem;
            background: transparent;
            color: #cbd5e1;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 700;
            text-align: left;
        }
        .student-select-option:hover,
        .student-select-option:focus-visible {
            color: #f8fafc;
            background: rgba(74, 222, 128, 0.12);
            outline: none;
        }
        .student-select-option.is-selected {
            color: #4ade80;
            background: rgba(74, 222, 128, 0.18);
        }
        .student-select-option.is-selected::before {
            content: "\f00c";
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            font-size: 0.72rem;
        }
        .student-select-option:not(.is-selected)::before {
            content: "";
            width: 0.72rem;
            flex: 0 0 auto;
        }

        /* Bottom player */
        .player-dock {
            background:
                linear-gradient(135deg, rgba(255, 255, 255, 0.06), rgba(15, 23, 42, 0.3)),
                rgba(15, 23, 42, 0.94);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(148, 163, 184, 0.18);
            border-radius: 999px;
            padding: 0.8rem 1.35rem;
            box-shadow: 0 18px 52px rgba(0, 0, 0, 0.48);
        }
        .player-control-btn,
        .voice-toggle {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 999px;
            transition: transform 150ms ease, color 150ms ease, background-color 150ms ease, border-color 150ms ease, box-shadow 150ms ease;
        }
        .player-control-btn {
            width: 2.5rem;
            height: 2.5rem;
            color: #94a3b8;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid transparent;
        }
        .player-control-btn:hover:not(:disabled) {
            color: #f8fafc;
            background: rgba(255, 255, 255, 0.09);
            transform: translateY(-1px);
        }
        .player-control-btn:disabled {
            color: #64748b;
            background: rgba(15, 23, 42, 0.18);
        }
        .play-toggle {
            width: 3.45rem;
            height: 3.45rem;
            color: #020617;
            background: #f8fafc;
            box-shadow: 0 0 24px rgba(255, 255, 255, 0.26), 0 12px 30px rgba(2, 6, 23, 0.25);
        }
        .play-toggle:hover:not(:disabled) {
            transform: translateY(-1px) scale(1.03);
        }
        .voice-toggle {
            width: 2.2rem;
            height: 2.2rem;
            color: #94a3b8;
            background: transparent;
        }
        .voice-toggle:hover {
            color: #f8fafc;
            background: rgba(255, 255, 255, 0.08);
        }
        .voice-toggle.is-active,
        .player-control-btn.is-active {
            color: #ffffff;
            background: linear-gradient(135deg, #22c55e, #10b981);
            box-shadow: 0 10px 22px rgba(34, 197, 94, 0.24);
        }
        .player-stop-btn {
            border-color: rgba(148, 163, 184, 0.32);
        }
        .player-stop-btn:hover:not(:disabled) {
            color: #fb7185;
            border-color: rgba(251, 113, 133, 0.58);
            background: rgba(251, 113, 133, 0.1);
        }
        #play-rate {
            accent-color: #22c55e;
        }

        #reading-container { padding-bottom: 180px !important; }
        #control-dock { padding-bottom: env(safe-area-inset-bottom, 20px); bottom: max(1.5rem, env(safe-area-inset-bottom)); }

        .vocab-item { 
            background: rgba(255, 255, 255, 0.05); /* 稍微調亮 */
            border-radius: 12px; margin-bottom: 8px; padding: 12px 16px; 
            display: flex; justify-content: space-between; align-items: center; 
            transition: all 0.2s; border: 1px solid transparent;

        function positionEnhancedSelectMenu(select) {
            const state = enhancedSelects.get(select);

            const rect = state.wrapper.getBoundingClientRect();
            const viewportWidth = window.innerWidth || document.documentElement.clientWidth || 320;
            const viewportHeight = window.innerHeight || document.documentElement.clientHeight || 480;
            const width = Math.min(Math.max(rect.width, 224), viewportWidth - 24);
            const left = Math.min(Math.max(12, rect.left), viewportWidth - width - 12);
            const below = rect.bottom + 8;
            const menuHeight = Math.min(state.menu.scrollHeight || 320, viewportHeight - 24);
            const top = below + menuHeight > viewportHeight
                ? Math.max(12, rect.top - menuHeight - 8)
                : below;

            state.menu.style.width = `${width}px`;
            state.menu.style.left = `${left}px`;
            state.menu.style.top = `${top}px`;
        }

        function refreshEnhancedSelect(select) {
            const state = enhancedSelects.get(select);
            if (!state) return;

            const selected = getSelectedOption(select);
            state.value.textContent = selected ? selected.textContent.trim() : getSelectPlaceholder(select);
            state.face.disabled = select.disabled;
            state.face.setAttribute('aria-disabled', String(select.disabled));
            state.wrapper.classList.toggle('is-disabled', select.disabled);

            state.menu.innerHTML = '';

                item.type = 'button';
                item.className = 'student-select-option';
                item.textContent = option.textContent.trim();
                item.dataset.value = option.value;
                item.setAttribute('role', 'option');

                    face,

          if(!vocabText) return map;

            const t = (token||"").toString().trim();
            if(!t) return;
            let zh = "", en = "";
            const tabParts = t.split(/\t+/);
            if(tabParts.length >= 2){ zh = tabParts[0].trim(); en = tabParts.slice(1).join(' ').trim(); } 
            else {
              const sepParts = t.split(/[:：=＝]/);
              if(sepParts.length >= 2){ zh = sepParts[0].trim(); en = sepParts.slice(1).join(':').trim(); } 
              else {
                const m = t.match(/^(.+?)[（(]\s*([^)）]+?)\s*[)）]\s*$/);
                if(m){ zh = (m[1]||"").trim(); en = (m[2]||"").trim(); } else { zh = t.trim(); en = ""; }
              }
            }
            if(zh) map[zh] = en;
          });
          return map;
        }

        function normalizeScienceKey(value) {
          return norm(value)
            .replace(/[：:]\s*$/g, "")
            .replace(/[\s　・·•\-–—_]+/g, "")
            .replace(/[，,。.!！?？；;：:（）()「」『』《》〈〉\[\]【】]/g, "");
        }

        function toHalfWidthNumber(value) {
          return String(value || "").replace(/[０-９]/g, ch => String.fromCharCode(ch.charCodeAt(0) - 0xFEE0));
        }

        function cnNumberToArabic(value) {
          const raw = String(value || "").trim();
          const direct = { "一": 1, "二": 2, "三": 3, "四": 4, "五": 5, "六": 6, "七": 7, "八": 8, "九": 9, "十": 10 };
          if (direct[raw]) return String(direct[raw]);
          const m = raw.match(/^十([一二三四五六七八九])$/);
          if (m) return String(10 + direct[m[1]]);
          const m2 = raw.match(/^([一二三四五六七八九])十([一二三四五六七八九])?$/);
          if (m2) return String(direct[m2[1]] * 10 + (m2[2] ? direct[m2[2]] : 0));
          return raw;
        }

        function splitLeadingUnitNumber(value) {
          const text = norm(value).replace(/\s+/g, " ");
          const match = text.match(/^(?:第\s*)?([0-9０-９]+|[一二三四五六七八九十]{1,3})\s*(?:單元|章|節)?\s*[、.．\-–—]?\s*(.+)$/);
          if (!match) return { number: "", body: text };
          const rawNumber = toHalfWidthNumber(match[1]);
          return {
            number: /^[0-9]+$/.test(rawNumber) ? rawNumber : cnNumberToArabic(rawNumber),
            body: (match[2] || "").trim()
          };
        }

        function lookupScienceExactTranslation(value) {
          const key = normalizeScienceKey(value);
          return SCIENCE_EXACT_TRANSLATIONS[key] || "";
        }

        function getLocalScienceTranslation(value) {
          const src = norm(value);
          if (!src) return "";

          const numbered = splitLeadingUnitNumber(src);
          const exactBody = lookupScienceExactTranslation(numbered.body);
          if (exactBody) return numbered.number ? `${numbered.number}. ${exactBody}` : exactBody;

          const exact = lookupScienceExactTranslation(src);
          if (exact) return exact;

          return SCIENCE_TERM_TRANSLATIONS[normalizeScienceKey(src)] || "";
        }

        function polishScienceTranslation(source, translated) {
          const local = getLocalScienceTranslation(source);
          if (local) return local;

          let out = (translated || "").toString().trim();
          if (!out) return out;

          if (normalizeScienceKey(source).includes("功與能")) {
            out = out.replace(/\bfunctions?\s+and\s+functions?\b/gi, "Work and Energy");
            out = out.replace(/\bfunction\s+and\s+function\b/gi, "Work and Energy");
            out = out.replace(/\bwork\s+and\s+function\b/gi, "Work and Energy");
            out = out.replace(/\bfunction\s+and\s+energy\b/gi, "Work and Energy");
          }

          out = out.replace(/\bwater vapour\b/gi, "water vapor");
          out = out.replace(/\belectric resistance\b/gi, "electrical resistance");
          return out;
        }

        function normalizeContentLine(line) {
          return norm(line).replace(/\s+/g, " ");
        }

        function isFigureCaptionLine(line) {
          const text = normalizeContentLine(line);
          if (!text) return false;
          const marker = "(?:圖說|圖片|照片|插圖|示意圖|圖)";
          const index = "(?:[0-9０-９一二三四五六七八九十甲乙丙丁戊己庚辛壬癸A-ZＡ-Ｚ]+(?:[-－~～][0-9０-９一二三四五六七八九十A-ZＡ-Ｚ]+)?)";
          return new RegExp(`^【?\\s*${marker}(?:\\s*${index})?\\s*(?:】|[：:、.．\\-–—)]|\\s|$)`).test(text);
        }

        function isTableCaptionLine(line) {
          const text = normalizeContentLine(line);
          if (!text) return false;
          const marker = "(?:表說|觀察紀錄表|觀察記錄表|資料表|紀錄表|記錄表|表格|表)";
          const index = "(?:[0-9０-９一二三四五六七八九十甲乙丙丁戊己庚辛壬癸A-ZＡ-Ｚ]+(?:[-－~～][0-9０-９一二三四五六七八九十A-ZＡ-Ｚ]+)?)";
          return new RegExp(`^【?\\s*${marker}(?:\\s*${index})?\\s*(?:】|[：:、.．\\-–—)]|\\s|$)`).test(text);
        }

        function isLoosePanelLabel(line) {
          const text = normalizeContentLine(line);
          return /^(?:[A-DＡ-Ｄ]|[甲乙丙丁戊己庚辛壬癸])\s*[：:、.．\-–—]/.test(text);
        }

        function isExplicitSectionHeading(line) {
          const text = normalizeContentLine(line);
          if (!text || isFigureCaptionLine(text) || isTableCaptionLine(text) || isLoosePanelLabel(text)) return false;
          const shortHeadingLike = text.length <= 36 && !/[。！？.!?]$/.test(text);
          if (/^【(?!\s*(?:圖|圖片|照片|插圖|示意圖|表|表格|資料表|紀錄表|記錄表))[^】]{2,28}】/.test(text)) return true;
          if (/^(?:活動|探究活動|實驗活動|小活動|延伸活動|閱讀活動|想一想|做做看|觀察活動)\s*[0-9０-９一二三四五六七八九十A-DＡ-Ｄ甲乙丙丁]?\s*[：:、.．\-–—]?\s*\S{2,}/.test(text)) return true;
          if (shortHeadingLike && /^第\s*(?:[0-9０-９]+|[一二三四五六七八九十]{1,3})\s*(?:節|章|單元)\s*\S{2,}/.test(text)) return true;
          if (shortHeadingLike && /^(?:[一二三四五六七八九十]{1,3}|[0-9０-９]+)\s*[、.．]\s*\S{2,}/.test(text)) return true;
          return false;
        }

        function classifyContentLine(line) {
          if (isFigureCaptionLine(line)) return "figure-caption";
          if (isTableCaptionLine(line)) return "table-caption";
          if (isExplicitSectionHeading(line)) return "section";
          return "paragraph";
        }

        function processData(data) {
            rawData = data.slice(1);

            }).filter(u => u.title);
            initFilters();
        }

            populateSelect('sel-stage', [...new Set(processedUnits.map(u=>u.stage).filter(Boolean))], 'stage');
            syncEnhancedSelects();
        }

function filterUnits(lvl) {
            const ids=['stage','grade','version','semester','unit'];
            const sels=ids.map(id=>document.getElementById(`sel-${id}`));

            // [修正重點 1]：切換上層時，強制將下層選單的 value 設為空字串，避免舊的篩選條件殘留
            if(lvl === 'stage') { sels[1].value = ''; sels[2].value = ''; sels[3].value = ''; }
            if(lvl === 'grade') { sels[2].value = ''; sels[3].value = ''; }
            if(lvl === 'version') { sels[3].value = ''; }

            let filtered = processedUnits.filter(u => {
                // 因為上面已經清空了下層 value，這裡就不會發生「國小」撞到「七年級」的狀況
                if(sels[0].value && u.stage!==sels[0].value) return false;
                if(sels[1].value && !sels[1].disabled && u.grade!==sels[1].value) return false;
                if(sels[2].value && !sels[2].disabled && u.version!==sels[2].value) return false;
                if(sels[3].value && !sels[3].disabled && u.semester!==sels[3].value) return false;
                return true;
            });
            
            const update=(sel,p,key)=> populateSelect(sel.id, [...new Set(filtered.map(u=>u[p]).filter(Boolean))], key);
            
            if(lvl==='stage') { update(sels[1],'grade','grade'); resetSelects(sels.slice(2)); }
            else if(lvl==='grade') { update(sels[2],'version','version'); resetSelects(sels.slice(3)); }
            else if(lvl==='version') { update(sels[3],'semester','semester'); resetSelects(sels.slice(4)); }
            else if(lvl==='semester') {
                const label = i18n[currentLang]['unit'] || '選擇單元';
                sels[4].innerHTML=`<option value="" disabled selected data-i18n="unit">${label}</option>`;
                filtered.forEach(u=>sels[4].add(new Option(u.title,u.id)));
                sels[4].disabled=false;
                refreshEnhancedSelect(sels[4]);
            }
            syncEnhancedSelects();
        }

        function populateSelect(id,items,i18nKey){
            const s=document.getElementById(id);
            const label = i18n[currentLang][i18nKey] || i18n['zh-TW'][i18nKey] || '請選擇';
            s.innerHTML=`<option value="" disabled selected>${label}</option>`;
            items.forEach(i=>s.add(new Option(i,i)));
            s.disabled=false;
            refreshEnhancedSelect(s);
        }
        function resetSelects(els){
            els.forEach(e=>{
                const key = e.id.replace('sel-','');
                const label = i18n[currentLang][key] || i18n['zh-TW'][key] || '...';
                e.innerHTML=`<option value="" disabled selected>${label}</option>`;
                e.disabled=true;
                refreshEnhancedSelect(e);
            });
        }

        async function translateToEn(text) {
          const src = (text || "").toString().trim();
          if(!src) return "";
          const cacheKey = "__title__" + src;
          const local = getLocalScienceTranslation(src);
          if (local) {
            translationCache[cacheKey] = local;
            return local;
          }
          if(translationCache[cacheKey]) return translationCache[cacheKey];
          try {
              const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=zh-TW&tl=en&dt=t&q=${encodeURIComponent(src)}`);
              const json = await res.json();
              let out = ""; (json[0] || []).forEach(x => out += (x[0] || ""));
              out = polishScienceTranslation(src, out);
              translationCache[cacheKey] = out;
              return out;
          } catch(e) { return src; }
        }

        function ensureTitleTranslated() {
          if(!currentUnitTitleZh) return;
          const existing = document.getElementById('title-en');
          if(existing && existing.innerText && existing.innerText !== 'Translating...') return;
          translateToEn(currentUnitTitleZh).then(en => {
            currentUnitTitleEn = en || "";
            const enEl = document.getElementById('title-en');
            if(enEl) enEl.innerText = currentUnitTitleEn || "";
          }).catch(() => {});
        }

        function rehighlightEnglishBlocks(){
          const ens = document.querySelectorAll('.en-text');
          ens.forEach(el => {
            const src = decodeURIComponent(el.getAttribute('data-source') || "");
            const cached = translationCache[src];
            if(cached){ el.innerHTML = makeClickable(highlightEnglishVocabInText(cached)); }
          });
        }

async function translateVisibleBlocks() {
    const ens = document.querySelectorAll('.en-text');
    const load = document.getElementById('trans-loading');

    let need = false;
    ens.forEach(e => {
        if (!e.innerText.trim()) need = true;
    });
    if (!need) return;

    if (load) load.classList.remove('hidden');

    for (const el of ens) {
        if (el.innerText.trim()) continue;

        const src = decodeURIComponent(el.getAttribute('data-source') || "").replace(/　/g, '').trim();
        if (!src) continue;

        const local = getLocalScienceTranslation(src);
        if (local) {
            translationCache[src] = local;
            el.innerHTML = makeClickable(highlightEnglishVocabInText(local));
            continue;
        }

        if (translationCache[src]) {
            el.innerHTML = makeClickable(highlightEnglishVocabInText(translationCache[src]));
            continue;
        }

        try {
            const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=zh-TW&tl=en&dt=t&q=${encodeURIComponent(src)}`);
            const json = await res.json();
            let txt = "";
            (json[0] || []).forEach(i => txt += (i[0] || ""));
            txt = polishScienceTranslation(src, txt);

            if (txt.trim()) {
                el.innerHTML = makeClickable(highlightEnglishVocabInText(txt));
                translationCache[src] = txt;
            } else {
                el.innerHTML = makeClickable(escapeHtml(src));
            }
        } catch (e) {
            el.innerHTML = makeClickable(escapeHtml(src));
        }
    }

    if (load) load.classList.add('hidden');
    rehighlightEnglishBlocks();
}

        function makeClickable(html) { return `<span class="cursor-pointer hover:text-green-300 transition">${html}</span>`; }
        function escapeHtml(s){ return (s||"").toString().replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;"); }
function highlightEnglishVocabInText(txt) {
  const src = (txt || "").toString();
  const terms = Object.values(activeVocabMap || {})
    .map(v => (v || "").trim())
    .filter(v => v && v !== "Loading..." && /[a-zA-Z]/.test(v));

  const uniq = [...new Set(terms)].sort((a, b) => b.length - a.length);
  if (!uniq.length) return escapeHtml(src);

  const matches = [];

  const overlaps = (start, end) =>
    matches.some(m => !(end <= m.start || start >= m.end));

  for (const term of uniq) {
    const escaped = term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const isSingleWord = /^[A-Za-z]+$/.test(term);
    const re = isSingleWord
      ? new RegExp(`\\b${escaped}\\b`, 'gi')
      : new RegExp(escaped, 'gi');

    let match;
    while ((match = re.exec(src)) !== null) {
      const start = match.index;
      const end = start + match[0].length;
      if (overlaps(start, end)) continue;
      matches.push({ start, end, text: match[0] });
    }
  }

  if (!matches.length) return escapeHtml(src);

  matches.sort((a, b) => a.start - b.start);

  let html = '';
  let last = 0;

  for (const m of matches) {
    html += escapeHtml(src.slice(last, m.start));
    const js = m.text.replace(/'/g, "\\'");
    html += `<span class="sci-term" onclick="event.stopPropagation(); trackEvent('term_clicked', { detail: '${escapeHtml(m.text)}', value: 'en' }); speakText('${js}')" title="${escapeHtml(m.text)}">${escapeHtml(m.text)}</span>`;
    last = m.end;
  }

  html += escapeHtml(src.slice(last));
  return html;
}

function clipText(text, max = 42) {
    const compact = norm(text).replace(/\s+/g, '');
    if (compact.length <= max) return compact;
    return compact.slice(0, max - 1) + '…';
}

function uniqueList(list) {
    const seen = new Set();
    return (list || []).map(x => norm(x)).filter(x => {
        if (!x || seen.has(x)) return false;
        seen.add(x);
        return true;
    });
}

function shuffleList(list) {
    return (list || [])
        .map(value => ({ value, order: Math.random() }))
        .sort((a, b) => a.order - b.order)
        .map(item => item.value);
}

function makeOptions(correct, candidates, fallback = []) {
    const pool = uniqueList([...(candidates || []), ...fallback]).filter(x => x !== correct);
    const options = uniqueList([correct, ...shuffleList(pool).slice(0, 3)]);
    while (options.length < 4) {
        const filler = `再觀察證據 ${options.length}`;
        if (!options.includes(filler)) options.push(filler);
    }
    return shuffleList(options.slice(0, 4));
}

function buildQuickChecks(unit, lines) {
    const paragraphLines = (lines || []).filter(line => classifyContentLine(line) === 'paragraph' && norm(line).length >= 12);
    const vocabEntries = getCheckVocabEntries();
    const vocabTerms = vocabEntries.map(item => item.zh);
    const checks = [];

    const conceptCheck = buildConceptCheck(lines);
    if (conceptCheck) checks.push(conceptCheck);

    const clozeSource = paragraphLines.find(line => vocabTerms.some(term => norm(line).includes(term)));
    if (clozeSource) {
        const term = vocabTerms.find(item => norm(clozeSource).includes(item));
        if (term) {
            checks.push({
                type: 'text_cloze',
                stem: `依據課文內容，空格最適合填入哪個科學詞？\n${clipText(clozeSource.replace(term, '（　）'), 74)}`,
                correct: term,
                options: makeOptions(term, vocabTerms, ['觀察', '證據', '變化', '溫度']),
                feedback: `回到原句可看到「${term}」是這裡的關鍵詞。`
            });
        }
    }

    const bilingualPool = vocabEntries.filter(item => item.en && /[A-Za-z]/.test(item.en));
    if (bilingualPool.length >= 3) {
        const item = bilingualPool[0];
        checks.push({
            type: 'bilingual_vocab',
            stem: `雙語詞彙檢核：「${item.en}」在本單元中最接近哪一個中文詞？`,
            correct: item.zh,
            options: makeOptions(item.zh, bilingualPool.map(x => x.zh), ['水蒸氣', '觀察', '證據', '溫度']),
            feedback: `「${item.en}」在本頁對應的中文詞是「${item.zh}」。`
        });
    }

    if (checks.length < 3 && paragraphLines.length >= 2) {
        const correct = clipText(paragraphLines[0], 34);
        checks.push({
            type: 'evidence_sentence',
            stem: '下列哪一句最適合當作回到課文查證的線索？',
            correct,
            options: makeOptions(correct, paragraphLines.slice(1, 6).map(line => clipText(line, 34)), [
                '只要看標題就能知道全部答案',
                '不需要任何資料也可以下結論',
                '只要顏色相同原因就會相同'
            ]),
            feedback: '做閱讀檢核時，最好能回到課文中的句子找證據。'
        });
    }

    return checks.slice(0, 3).map((check, index) => ({
        ...check,
        id: `${unit?.id ?? 'unit'}-${check.type}-${index}`,
        correctIndex: check.options.indexOf(check.correct)
    })).filter(check => check.correctIndex >= 0);
}

function renderQuickChecks() {
    const panel = document.getElementById('quick-check-panel');
    if (!panel) return;

    if (!currentQuickChecks.length) {
        panel.classList.add('hidden');
        panel.innerHTML = '';
        return;
    }

    const answered = Object.keys(quickCheckAnswers).length;
    const correctCount = Object.values(quickCheckAnswers).filter(Boolean).length;
    const total = currentQuickChecks.length;
    const letters = ['A', 'B', 'C', 'D'];

    const itemsHtml = currentQuickChecks.map((check, qIndex) => {
        const hasAnswered = Object.prototype.hasOwnProperty.call(quickCheckAnswers, qIndex);
        const selectedIndex = check.selectedIndex;
        const optionsHtml = check.options.map((option, optIndex) => {
            let stateClass = '';
            if (hasAnswered && optIndex === check.correctIndex) stateClass = ' is-correct';
            if (hasAnswered && optIndex === selectedIndex && optIndex !== check.correctIndex) stateClass = ' is-wrong';
            return `
                <button class="quick-check-option${stateClass}" ${hasAnswered ? 'disabled' : ''} onclick="answerQuickCheck(${qIndex}, ${optIndex})">
                    <span class="quick-check-letter">${letters[optIndex] || ''}</span>
                    <span>${escapeHtml(option)}</span>
                </button>`;
        }).join('');

        const feedback = hasAnswered
            ? `<div class="quick-check-feedback">${quickCheckAnswers[qIndex] ? '答對了。' : '再回文中找一次證據。'} ${escapeHtml(check.feedback || '')}</div>`
            : '';

        return `
            <div class="quick-check-item">
                <div class="quick-check-stem">${qIndex + 1}. ${escapeHtml(check.stem)}</div>
                <div class="quick-check-options">${optionsHtml}</div>
                ${feedback}
            </div>`;
    }).join('');

    panel.innerHTML = `
        <div class="quick-check-header">
            <div>
                <div class="quick-check-title"><i class="fa-solid fa-list-check"></i><span>閱讀小檢核</span></div>
                <div class="text-sm text-slate-400 mt-1">完成閱讀後，快速確認你是否抓到關鍵概念與雙語詞彙。</div>
            </div>
            <div class="quick-check-score">${correctCount}/${total} 正確</div>
        </div>
        <div class="quick-check-list">${itemsHtml || '<div class="quick-check-empty">本單元暫無可產生的小檢核。</div>'}</div>
    `;
    panel.classList.remove('hidden');

    const checkStatus = document.getElementById('reading-check-status');
    if (checkStatus) checkStatus.textContent = `小檢核 ${answered}/${total}`;
}

function answerQuickCheck(qIndex, optionIndex) {
    const check = currentQuickChecks[qIndex];
    if (!check || Object.prototype.hasOwnProperty.call(quickCheckAnswers, qIndex)) return;

    if (!quickCheckStarted) {
        quickCheckStarted = true;
        trackEvent('quick_check_started', {
            detail: currentUnitData?.title || '',
            value: currentQuickChecks.length,
            check_total: currentQuickChecks.length
        });
    }

    check.selectedIndex = optionIndex;
    const isCorrect = optionIndex === check.correctIndex;
    quickCheckAnswers[qIndex] = isCorrect;
    trackEvent('quick_check_answered', {
        detail: check.type,
        value: isCorrect ? 'correct' : 'incorrect',
        question_index: qIndex + 1,
        selected_answer: check.options[optionIndex] || '',
        correct_answer: check.correct || ''
    });

    const answered = Object.keys(quickCheckAnswers).length;
    if (answered === currentQuickChecks.length) {
        const correctCount = Object.values(quickCheckAnswers).filter(Boolean).length;
        trackEvent('quick_check_completed', {
            detail: currentUnitData?.title || '',
            value: correctCount,
            check_total: currentQuickChecks.length,
            score_percent: Math.round((correctCount / currentQuickChecks.length) * 100)
        });
    }

    renderQuickChecks();
}

function checkUnitCompletion() {
    if (!currentUnitData) return;

    const container = document.getElementById('reading-container');
    if (!container) return;

    const scrollBottom = container.scrollTop + container.clientHeight;
    const nearBottom = scrollBottom >= container.scrollHeight - 80;

    if (nearBottom && !completedUnits.has(currentUnitData.id)) {
        completedUnits.add(currentUnitData.id);
        trackEvent('unit_completed', { detail: currentUnitData.title });
    }
}

        // [核心修正] 播放序列邏輯
       function playSequence() {
            // 安全檢查：如果旗標被關閉，絕對禁止執行
            if (!isSpeaking) return;

            // 更新播放按鈕狀態
            setPlaybackButtonIcon(true);

            const blocks = getReadingBlocks();
            if (currentBlockIndex >= blocks.length) { resetAudio(); return; }
            updatePlaybackControls();

            // 高亮當前區塊
            clearHighlights();
            const block = blocks[currentBlockIndex];
            highlightBlock(block);
           trackBlockPlayed(block, currentBlockIndex);

            // 抓取文字
            const enEl = block.querySelector('.en-text');
            const zhEl = block.querySelector('.zh-text');
            
            const enVisible = enEl && !enEl.classList.contains('hidden');
            const zhVisible = zhEl && !zhEl.classList.contains('hidden');
            
            let texts = [];
            // 優先讀取 data-speak (純文字/注音對應字)，若無則讀 innerText
            if (zhVisible) {
                const txt = zhEl.getAttribute('data-speak') || zhEl.innerText;
                if(txt) texts.push(txt);
            }
            if (enVisible && enEl.innerText) texts.push(enEl.innerText);

            if (texts.length > 0) {
                let tIdx = 0;
                
                // 定義遞迴播放函式
                const playNextPart = () => {
                    // [關鍵] 每次播放下一小段前，再次檢查是否被使用者卡斷
                    if(!isSpeaking) return; 

                    if(tIdx >= texts.length) {
                        // 這一句唸完了
                        if (!isLooping) {
                            currentBlockIndex++; // 如果沒開重覆，索引+1
                        }
                        
                        // 準備唸下一句 (中間停頓 0.3秒)
                        setTimeout(() => {
                            // [關鍵] 在啟動下一句之前，最後一次檢查 flag
                            if(isSpeaking) playSequence();
                        }, 300);
                        return;
                    }

                    // 執行發音
                    speakText(texts[tIdx], () => {
                        tIdx++;
                        // 段落間的小停頓 (例如中文唸完接英文)
                        setTimeout(playNextPart, 100); 
                    });
                };
                playNextPart();
            } else {
                // 如果這區塊沒文字 (防呆)，直接跳下一句
                if (!isLooping) currentBlockIndex++;
                if(isSpeaking) playSequence();
            }
        }

        function getCkipTokenSet(ckipLine){
          const raw = (ckipLine || "").toString().trim();
          if(!raw) return new Set();
          return new Set(raw.replace(/　/g, " ").split(/\s+/).filter(Boolean).map(tok => tok.replace(/[\(（].*$/, "")).filter(Boolean));
        }
        function getCkipTokenArray(ckipText) {
          const raw = (ckipText || "").toString().replace(/　/g, " ").trim();
          if (!raw) return [];
          return raw.split(/\s+/).filter(Boolean).map(tok => tok.replace(/[\(（].*$/, "")).filter(Boolean);
        }
        function getMaxKeyLen(vocabMap) {
          const keys = Object.keys(vocabMap || {});
          if (!keys.length) return 1;
          let m = 1; for (const k of keys) m = Math.max(m, (k || "").length); return m;
        }
        function buildCkipMergeSet(tokens, maxLen) {
          const set = new Set();
          if (!tokens || !tokens.length) return set;
          const L = Math.max(2, maxLen || 2);
          for (let i = 0; i < tokens.length; i++) {
            let acc = "";
            for (let j = i; j < tokens.length; j++) {
              acc += tokens[j];
              if (acc.length > L) break;
              if (acc.length >= 2) set.add(acc);
            }
          }
          return set;
        }
        function shouldMarkZhTerm(term, ckipTokenSet, ckipMergeSet) {
          if (!term) return false;
          if (!ckipTokenSet || ckipTokenSet.size === 0) return true;
          if (term.length === 1) return ckipTokenSet.has(term);
          if (ckipTokenSet.has(term)) return true;
          if (ckipMergeSet && ckipMergeSet.has(term)) return true;
          return false;
        }
        function processXRayWithCKIP(text, map, ckipTokenSet, ckipMergeSet) {
          const src = (text || "").toString().replace(/　/g, " ");
          const keys = Object.keys(map || {}).filter(Boolean).sort((a, b) => b.length - a.length);
          if (!keys.length) return escapeHtml(src);
          const spans = [];
          const overlaps = (s, e) => spans.some(sp => !(e <= sp.start || s >= sp.end));
          for (const term of keys) {
            let from = 0;
            while (true) {
              const idx = src.indexOf(term, from);
              if (idx === -1) break;
              const start = idx, end = idx + term.length;
              from = idx + term.length;
              if (overlaps(start, end)) continue;
              if (!shouldMarkZhTerm(term, ckipTokenSet, ckipMergeSet)) continue;
              spans.push({ start, end, term });
            }
          }
          if (!spans.length) return escapeHtml(src);
          spans.sort((a, b) => a.start - b.start);
          let html = "", last = 0;
          for (const sp of spans) {
            html += escapeHtml(src.slice(last, sp.start));
            const zh = sp.term;
            const js = ((map[zh] || zh) + "").toString().replace(/'/g, "\\'");
            const title = escapeHtml(((map[zh] || "") + "").toString());
            html += `<span class="sci-term" onclick="event.stopPropagation(); trackEvent('term_clicked', { detail: '${escapeHtml(zh)}', value: 'zh' }); speakText('${js}')" title="${title}">${escapeHtml(zh)}</span>`;
            last = sp.end;
          }
          html += escapeHtml(src.slice(last));
          return html;
        }

        function isIOSDevice(){
            return /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
        }

        function isAndroidDevice(){
            return /Android/i.test(navigator.userAgent || "");
        }

        function clamp(value, min, max){
            return Math.min(max, Math.max(min, value));
        }

        function isMostlyEnglish(txt){
            const t = (txt || "").toString();
            const latin = (t.match(/[A-Za-z]/g) || []).length;
            const cjk   = (t.match(/[\u4E00-\u9FFF]/g) || []).length;
            if (cjk === 0) return latin > 0;
            return latin > cjk * 2;
        }

        function normalizeSpeechText(txt) {
            const helper = window.AISchoolTTS?.helpers?.normalizeSpeechText;
            if (typeof helper === 'function') return helper(txt);
            return (txt || "").toString().replace(/<[^>]*>/g, " ").replace(/\u00A0/g, " ").replace(/\s+/g, " ").trim();
        }

        function resolveSpeechLanguage(txt) {
            return isMostlyEnglish(txt) ? 'en-US' : 'zh-TW';
        }

        function pickBestVoice(isEng, gender) {
            const helper = window.AISchoolTTS?.helpers?.pickBestVoice;
            if (typeof helper === 'function' && window.speechSynthesis) {
                return helper(window.speechSynthesis.getVoices(), isEng, gender);
            }
            if (!window.speechSynthesis) return null;
            const voices = window.speechSynthesis.getVoices();
            return voices.length > 0 ? voices[0] : null;
        }

        function getSpeechTuning(isEng, voice, uiRate) {
            const helper = window.AISchoolTTS?.helpers?.getSpeechTuning;
            if (typeof helper === 'function') {
                return helper(isEng, voice, currentVoice, uiRate);
            }
            return {
                rate: clamp(uiRate, 0.8, 1.1),
                pitch: currentVoice === 'male' ? 0.92 : 1.0
            };
        }

        function speakTextLegacy(txt, onComplete) {
            if (!synth) return;
            isSpeaking = true;
            if (synth.paused) synth.resume();
            
            setPlaybackButtonIcon(true);
            synth.cancel();

            const cleanTxt = normalizeSpeechText(txt);
            if (!cleanTxt) {
                if (onComplete) { setTimeout(() => { if (isSpeaking) onComplete(); }, 10); } 
                else { isSpeaking = false; setPlaybackButtonIcon(false); updatePlaybackControls(); }
                return;
            }

            const ios = isIOSDevice();
            const android = isAndroidDevice();
            const isEng = isMostlyEnglish(cleanTxt);
            const lang = resolveSpeechLanguage(cleanTxt);
            const mobileSpeech = ios || android;
            const maxChunkLength = isEng ? (mobileSpeech ? 180 : 260) : (mobileSpeech ? 42 : 70);
            const chunks = cleanTxt.length > maxChunkLength ? splitTextForSpeak(cleanTxt, isEng, maxChunkLength) : [cleanTxt];
            const uiRate = parseFloat(document.getElementById('play-rate')?.value || "1.0");
            let idx = 0;

            const speakNext = () => {
                if (!isSpeaking) return;
                if (idx >= chunks.length) {
                    if (onComplete) { onComplete(); } 
                    else { isSpeaking = false; setPlaybackButtonIcon(false); updatePlaybackControls(); }
                    return;
                }
                const part = chunks[idx++];
                const u = new SpeechSynthesisUtterance(part);
                u.lang = lang;
                
                let voice = pickBestVoice(isEng, currentVoice);
                if (voice) u.voice = voice;
                if (voice && voice.lang) u.lang = voice.lang;

                const tuning = getSpeechTuning(isEng, voice, uiRate);
                u.rate = tuning.rate;
                u.pitch = tuning.pitch;

                u.onend = speakNext;
                u.onerror = (e) => { if (isSpeaking) speakNext(); };
                synth.speak(u);
            };
            
            if(synth.getVoices().length === 0 && synth.onvoiceschanged) {
                synth.onvoiceschanged();
                setTimeout(speakNext, 100);
            } else {
                speakNext();
            }
        }

        function splitTextForSpeak(text, isEng, maxChunkLength) {
            const helper = window.AISchoolTTS?.helpers?.splitTextForSpeak;
            if (typeof helper === 'function') return helper(text, isEng, maxChunkLength);

            const sourceText = normalizeSpeechText(text);
            const regex = isEng ? /([.?!;]+\s*)/ : /([\u3002\uff01\uff1f\uff1b!?;]+\s*)/;
            const segments = sourceText.split(regex).reduce((acc, curr, i) => {
                if (i % 2 === 0) acc.push(curr);
                else acc[acc.length - 1] += curr;
                return acc;
            }, []).filter(s => s.trim().length > 0);

            const limit = maxChunkLength || (isEng ? 220 : 60);
            const chunks = [];

            for (const segment of segments) {
                const trimmed = segment.trim();
                if (!trimmed) continue;

                if (trimmed.length <= limit) {
                    chunks.push(trimmed);
                    continue;
                }

                const parts = trimmed.split(isEng ? /([,:]\s*)/ : /([\uff0c\u3001\uff1a,:\uff1b;]\s*)/).filter(Boolean);
                let buffer = "";
                for (const part of parts) {
                    const candidate = `${buffer}${part}`.trim();
                    if (candidate.length > limit && buffer) {
                        chunks.push(buffer.trim());
                        buffer = part;
                    } else {
                        buffer += part;
                    }
                }

                if (buffer.trim()) {
                    chunks.push(buffer.trim());
                }
            }

            return chunks.length ? chunks : (sourceText ? [sourceText] : []);
        }

function speakText(txt, onComplete) {
    if (!ttsPlayer && !synth) return;
    isSpeaking = true;

    setPlaybackButtonIcon(true);
    updatePlaybackControls();

    const cleanTxt = normalizeSpeechText(txt);
    if (!cleanTxt) {
        if (onComplete) { setTimeout(() => { if (isSpeaking) onComplete(); }, 10); }
        else { isSpeaking = false; setPlaybackButtonIcon(false); updatePlaybackControls(); }
        return;
    }

    const finishPlayback = () => {
        updateTtsStatus();
        if (onComplete) {
            onComplete();
        } else {
            isSpeaking = false;
            setPlaybackButtonIcon(false);
            updatePlaybackControls();
        }
    };

    if (ttsPlayer?.speak) {
        const isEng = isMostlyEnglish(cleanTxt);
        ttsPlayer.speak(cleanTxt, {
            gender: currentVoice,
            isEng,
            lang: resolveSpeechLanguage(cleanTxt),
            rate: getUiRate(),
            onComplete: finishPlayback
        }).catch(() => {
            updateTtsStatus('browser');
            finishPlayback();
        });
        return;
    }

    if (synth) {
        const isEng = isMostlyEnglish(cleanTxt);
        const utterance = new SpeechSynthesisUtterance(cleanTxt);
        const voice = pickBestVoice(isEng, currentVoice);
        utterance.lang = voice?.lang || resolveSpeechLanguage(cleanTxt);
        if (voice) utterance.voice = voice;
        const tuning = getSpeechTuning(isEng, voice, getUiRate());
        utterance.rate = tuning.rate;
        utterance.pitch = tuning.pitch;
        utterance.onend = finishPlayback;
        utterance.onerror = finishPlayback;
        synth.cancel();
        synth.speak(utterance);
        return;
    }

    finishPlayback();
}

            if(m !== 'zh') ensureTitleTranslated();
        }
function getStudentInfo() {
    let studentId = '';
    let studentName = '';

    const currentUser = window.AISchool && window.AISchool.getCurrentUser
        ? window.AISchool.getCurrentUser()
        : null;

    if (currentUser) {
        studentId = currentUser.id || currentUser.email || currentUser.account || currentUser.studentId || currentUser.username || '';
        studentName = currentUser.name || currentUser.email || '';
    }

    return { studentId, studentName };
}

function getTrackingSessionId() {
    const key = 'aischool_bilingual_reading_session_id';
    let id = sessionStorage.getItem(key);
    if (!id) {
        id = (window.crypto && crypto.randomUUID)
            ? crypto.randomUUID()
            : `${Date.now()}-${Math.random().toString(36).slice(2)}`;
        sessionStorage.setItem(key, id);
    }
    return id;
}

function getCurrentProgressPercent() {
    const container = document.getElementById('reading-container');
    if (!container || !currentUnitData) return '';
    const total = container.scrollHeight - container.clientHeight;
    if (total <= 0) return 100;
    return Math.max(0, Math.min(100, Math.round((container.scrollTop / total) * 100)));
}

function getQuickCheckStats() {
    const total = currentQuickChecks.length || 0;
    const answered = Object.keys(quickCheckAnswers || {}).length;
    const correct = Object.values(quickCheckAnswers || {}).filter(Boolean).length;
    return {
        total,
        answered,
        correct,
        scorePercent: total ? Math.round((correct / total) * 100) : ''
    };
}

function trackEvent(eventName, extra = {}) {
    const { studentId, studentName } = getStudentInfo();
    const unitName = currentUnitData?.title || currentUnitTitleZh || '';
    const versionValue = document.getElementById('sel-version')?.value || '';
    const quickStats = getQuickCheckStats();

    const payload = {
        action: 'log_event',
        schema_version: BILINGUAL_TRACKING_SCHEMA_VERSION,
        client_time: new Date().toISOString(),
        session_id: getTrackingSessionId(),
        student_id: studentId,
        student_name: studentName,
        studentId: studentId,
        studentName: studentName,
        account: studentId,
        userName: studentName,
        event: eventName,
        stage: document.getElementById('sel-stage')?.value || '',
        grade: document.getElementById('sel-grade')?.value || '',
        version: versionValue,
        publisher: versionValue,
        semester: document.getElementById('sel-semester')?.value || '',
        unit: unitName,
        unitName: unitName,
        mode: currentMode,
        language: extra.language || currentLang,
        detail: extra.detail || '',
        value: extra.value || '',
        duration: extra.duration || '',
        page: 'student_science_bilingual.html',
        block_index: extra.block_index ?? '',
        block_role: extra.block_role ?? '',
        text_length: extra.text_length ?? '',
        progress_percent: extra.progress_percent ?? getCurrentProgressPercent(),
        check_total: extra.check_total ?? quickStats.total,
        check_answered: extra.check_answered ?? quickStats.answered,
        check_correct: extra.check_correct ?? quickStats.correct,
        question_index: extra.question_index ?? '',
        selected_answer: extra.selected_answer || '',
        correct_answer: extra.correct_answer || '',
        score_percent: extra.score_percent ?? quickStats.scorePercent,
        extra_json: JSON.stringify(extra || {})
    };

    if (window.AISchoolLearning) {
        window.AISchoolLearning.track('bilingual_reading', eventName, {
            ...payload,
            unit: unitName,
            publisher: versionValue,
            progress_percent: payload.reading_progress,
            score: payload.check_total ? Math.round((payload.check_correct / payload.check_total) * 100) : '',
            ...extra
        });
    }

    if (!TRACKING_URL) return;

    fetch(TRACKING_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        keepalive: true,
        body: JSON.stringify(payload)
    }).catch(() => {});
}

function trackPageLeave() {
    trackUnitLeave();

    const duration = Math.round((Date.now() - pageEnterTime) / 1000);
    trackEvent('page_leave', { duration });
}
function trackBlockPlayed(block, index) {
    if (!block || !currentUnitData) return;

    const zhEl = block.querySelector('.zh-text');
    const enEl = block.querySelector('.en-text');

    const zhText = (zhEl?.getAttribute('data-speak') || zhEl?.innerText || '').trim();
    const enText = (enEl?.innerText || '').trim();

    const preview = zhText || enText;
    if (!preview) return;

    const shortPreview = preview.length > 60 ? preview.slice(0, 60) + '...' : preview;
    const blockKey = `${currentUnitData.id}-${index}-${shortPreview}`;

    if (lastTrackedBlockKey === blockKey) return;
    lastTrackedBlockKey = blockKey;

    trackEvent('block_played', {
        detail: shortPreview,
        value: index,
        block_index: index,
        block_role: block.getAttribute('data-block-role') || '',
        text_length: preview.length,
        language_available: enText ? 'zh_en' : 'zh_only'
    });
}

function trackUnitLeave() {
    if (!currentUnitData || !unitEnterTime) return;

    const duration = Math.round((Date.now() - unitEnterTime) / 1000);
    const quickStats = getQuickCheckStats();
    trackEvent('unit_leave', {
        detail: currentUnitData.title,
        duration: duration,
        progress_percent: getCurrentProgressPercent(),
        check_total: quickStats.total,
        check_answered: quickStats.answered,
        check_correct: quickStats.correct,
        score_percent: quickStats.scorePercent
    });
}
        
        function showToast(m) { const T=document.getElementById('toast'); document.getElementById('toast-msg').innerText=m; T.classList.remove('opacity-0','-translate-y-10'); setTimeout(()=>T.classList.add('opacity-0','-translate-y-10'),2500); }
    </script>
