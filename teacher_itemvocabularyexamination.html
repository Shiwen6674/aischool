<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>命題用語檢核 | Science Learning Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        teacher: { light: '#bbf7d0', DEFAULT: '#22c55e', dark: '#15803d' },
                    },
                    animation: { "fade-in-up": "fadeInUp 0.5s ease-out forwards" },
                    keyframes: { "fadeInUp": { "0%": { opacity: "0", transform: "translateY(10px)" }, "100%": { opacity: "1", transform: "translateY(0)" } } }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
            min-height: 100vh;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 10px 25px -5px rgba(22, 163, 74, 0.1), 0 8px 10px -6px rgba(22, 163, 74, 0.1);
        }
        .input-field { transition: all 0.2s; border: 1px solid #d1d5db; }
        .input-field:focus { box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.3); border-color: #22c55e; outline: none; }
        .loader { border: 3px solid rgba(34, 197, 94, 0.2); border-radius: 50%; border-top: 3px solid #22c55e; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .bg-safe-deep { background-color: #166534; color: white; } 
        .bg-safe-light { background-color: #22c55e; color: white; } 
        .bg-warn { background-color: #f97316; color: white; } 
        .bg-danger { background-color: #dc2626; color: white; } 
        .scrollbar-thin::-webkit-scrollbar { width: 6px; height: 6px; }
        .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
        .scrollbar-thin::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 3px; }
        
        /* Tooltip 樣式 */
        .tooltip-container { position: relative; display: inline-block; cursor: help; }
        .tooltip-content {
            visibility: hidden;
            width: 280px;
            background-color: #1e293b;
            color: #fff;
            text-align: left;
            border-radius: 8px;
            padding: 12px;
            position: absolute;
            z-index: 100;
            bottom: 125%;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0;
            transition: opacity 0.3s;
            font-size: 0.75rem;
            line-height: 1.4;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            pointer-events: none;
        }
        .tooltip-content::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -5px;
            border-width: 5px;
            border-style: solid;
            border-color: #1e293b transparent transparent transparent;
        }
        .tooltip-container:hover .tooltip-content {
            visibility: visible;
            opacity: 1;
        }
    </style>
    <script src="./assets/js/aischool-shared.js"></script>
    <script src="./assets/js/teacher-item-vocab-data.js"></script>
</head>
<body class="p-4 md:p-8 relative overflow-x-hidden text-slate-800">

    <div class="fixed top-0 left-0 w-full h-full overflow-hidden -z-10 pointer-events-none">
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-green-200/30 blur-3xl animate-pulse"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] rounded-full bg-emerald-200/20 blur-3xl animate-pulse" style="animation-delay: 2s;"></div>
    </div>

    <nav class="glass-panel sticky top-2 z-50 rounded-2xl mb-8 p-4 flex justify-between items-center max-w-7xl mx-auto">
        <div class="flex items-center space-x-3 cursor-pointer group" onclick="window.location.href='teacher.html'">
            <div class="bg-green-100 p-2 rounded-xl text-green-600 group-hover:bg-green-600 group-hover:text-white transition">
                <i class="fa-solid fa-chevron-left"></i>
            </div>
            <span class="text-lg font-bold tracking-tight text-slate-700" data-i18n="back_btn">返回教學中心</span>
        </div>
        <div class="flex items-center gap-3">
            <i class="fa-solid fa-globe text-slate-500"></i>
            <select id="language-selector" onchange="changeLanguage()" class="bg-white/50 border border-slate-200 text-slate-600 text-sm rounded-lg focus:ring-green-500 focus:border-green-500 block p-2 outline-none hover:bg-white transition cursor-pointer">
                <option value="zh-TW">繁體中文</option>
                <option value="en">English</option>
                <option value="ja">日本語</option>
                <option value="zh-CN">简体中文</option>
            </select>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto animate-fade-in-up">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-green-700 to-emerald-600 mb-3" data-i18n="page_title">
                中小學自然科命題用詞 AI 檢核
            </h1>
            <p class="text-slate-600 text-lg" data-i18n="page_subtitle">
                結合大數據資料庫與生成式 AI，精準診斷命題適切性
            </p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4 space-y-6">
                <div class="glass-panel p-6 rounded-3xl">
                    <h2 class="text-xl font-bold text-slate-700 mb-5 border-b border-green-100 pb-3 flex items-center">
                        <i class="fa-solid fa-sliders mr-3 text-green-600"></i> <span data-i18n="settings_title">參數設定</span>
                    </h2>
                    <div class="space-y-5">
                        <div>
                            <label class="block text-sm font-bold text-slate-700 mb-2">
                                <span data-i18n="label_stage">學習階段</span> <span class="text-red-500">*</span>
                            </label>
                            <select id="stage" class="w-full p-3 rounded-xl bg-white/70 input-field" onchange="updateGrades()">
                                <option value="" disabled selected data-i18n="opt_select">請選擇學習階段</option>
                                <option value="國小" data-i18n="opt_elem">國小</option>
                                <option value="國中" data-i18n="opt_junior">國中</option>
                            </select>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-bold text-slate-700 mb-2" data-i18n="label_grade">目標年級</label>
                                <select id="grades" class="w-full p-3 rounded-xl bg-white/70 input-field">
                                    <option value="" selected data-i18n="opt_any">不限</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-slate-700 mb-2" data-i18n="label_semester">目標學期</label>
                                <select id="semester" class="w-full p-3 rounded-xl bg-white/70 input-field">
                                    <option value="" selected data-i18n="opt_any">不限</option>
                                    <option value="上" data-i18n="opt_sem1">上學期</option>
                                    <option value="下" data-i18n="opt_sem2">下學期</option>
                                </select>
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-slate-700 mb-2" data-i18n="label_version">教科書版本</label>
                            <select id="version" class="w-full p-3 rounded-xl bg-white/70 input-field">
                                <option value="" selected data-i18n="opt_any">不限</option>
                                <option value="南一">南一</option>
                                <option value="康軒">康軒</option>
                                <option value="翰林">翰林</option>
                            </select>
                        </div>
                        <div class="pt-2">
                            <label class="block text-sm font-bold text-slate-700 mb-3" data-i18n="label_pos">檢測詞性 (多選)</label>
                            <div class="flex flex-wrap gap-2">
                                <label class="bg-white/70 px-3 py-2 rounded-xl border border-green-100 flex items-center hover:bg-green-50 cursor-pointer transition shadow-sm text-sm"><input type="checkbox" name="pos" value="N" checked class="mr-2 accent-green-600 w-4 h-4"><span data-i18n="pos_n">名詞 (Na/Nb/Nc/Nf)</span></label>
                                <label class="bg-white/70 px-3 py-2 rounded-xl border border-green-100 flex items-center hover:bg-green-50 cursor-pointer transition shadow-sm text-sm"><input type="checkbox" name="pos" value="V" checked class="mr-2 accent-green-600 w-4 h-4"><span data-i18n="pos_v">動詞</span></label>
                                <label class="bg-white/70 px-3 py-2 rounded-xl border border-green-100 flex items-center hover:bg-green-50 cursor-pointer transition shadow-sm text-sm"><input type="checkbox" name="pos" value="A" class="mr-2 accent-green-600 w-4 h-4"><span data-i18n="pos_a">形容詞</span></label>
                                <label class="bg-white/70 px-3 py-2 rounded-xl border border-green-100 flex items-center hover:bg-green-50 cursor-pointer transition shadow-sm text-sm"><input type="checkbox" name="pos" value="D" class="mr-2 accent-green-600 w-4 h-4"><span data-i18n="pos_d">副詞</span></label>
                                <label class="bg-white/70 px-3 py-2 rounded-xl border border-green-100 flex items-center hover:bg-green-50 cursor-pointer transition shadow-sm text-sm"><input type="checkbox" name="pos" value="C" class="mr-2 accent-green-600 w-4 h-4"><span data-i18n="pos_c">連接詞</span></label>
                                <label class="bg-white/70 px-3 py-2 rounded-xl border border-green-100 flex items-center hover:bg-green-50 cursor-pointer transition shadow-sm text-sm"><input type="checkbox" name="pos" value="O" class="mr-2 accent-green-600 w-4 h-4"><span data-i18n="pos_o">其他</span></label>
                            </div>
                        </div>
                    </div>
                </div>
                
                <button id="runBtn" onclick="runAnalysis()" class="w-full bg-gradient-to-r from-green-600 to-teal-600 text-white py-4 rounded-2xl hover:shadow-lg hover:shadow-green-500/30 transition-all font-bold text-xl tracking-wide transform active:scale-[0.98] flex items-center justify-center gap-3">
                    <i class="fa-solid fa-magnifying-glass-chart"></i> <span data-i18n="btn_start">開始 AI 檢測</span>
                </button>
            </div>

            <div class="lg:col-span-8 space-y-8">
                <div class="glass-panel p-6 rounded-3xl relative">
                    <div class="flex justify-between items-center mb-4">
                        <label class="block font-bold text-slate-700 text-xl">
                            <i class="fa-regular fa-file-lines mr-2 text-green-600"></i> <span data-i18n="label_text_input">試題文本</span>
                        </label>
                        <div class="flex gap-2">
                            <button onclick="loadExample()" class="text-sm bg-green-50 text-green-700 px-4 py-2 rounded-xl hover:bg-green-100 transition font-medium border border-green-200 flex items-center">
                                <i class="fa-solid fa-wand-magic-sparkles mr-2"></i> <span data-i18n="btn_example">載入範例</span>
                            </button>
                            <button onclick="document.getElementById('text').value=''" class="text-sm bg-slate-50 text-slate-500 px-4 py-2 rounded-xl hover:bg-red-50 hover:text-red-500 transition border border-slate-200" title="清空">
                                <i class="fa-solid fa-trash-can"></i>
                            </button>
                        </div>
                    </div>
                    <textarea id="text" class="w-full h-64 p-5 rounded-2xl bg-white/70 text-slate-700 text-base leading-relaxed resize-none input-field scrollbar-thin font-mono" placeholder="請在此貼上包含題幹與選項的完整試題內容..." data-i18n-placeholder="placeholder_text"></textarea>
                </div>

                <div id="result-area" class="hidden space-y-8 animate-fade-in-up">
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                        <div class="glass-panel p-5 rounded-2xl text-center border-b-4 border-green-500 tooltip-container group">
                            <div class="text-sm text-slate-500 mb-2 font-medium flex items-center justify-center gap-2">
                                <span data-i18n="kpi_score">適切性評分</span>
                                <i class="fa-regular fa-circle-question text-slate-400 group-hover:text-green-600 transition-colors"></i>
                            </div>
                            <div class="text-4xl font-black text-green-600" id="res-score">--</div>
                            <div class="tooltip-content">
                                <div class="font-bold text-green-400 mb-1 border-b border-slate-600 pb-1">計算公式</div>
                                <div class="mb-2">100 - Σ (學期差 × 2)</div>
                                <div class="font-bold text-green-400 mb-1 border-b border-slate-600 pb-1">本次算式</div>
                                <div id="res-score-detail" class="text-slate-300">請先進行分析...</div>
                            </div>
                        </div>

                        <div class="glass-panel p-5 rounded-2xl text-center">
                            <div class="text-sm text-slate-500 mb-2 font-medium" data-i18n="kpi_total">分析詞彙數</div>
                            <div class="text-3xl font-bold text-slate-700" id="res-total">0</div>
                        </div>
                        <div class="glass-panel p-5 rounded-2xl text-center">
                            <div class="text-sm text-slate-500 mb-2 font-medium" data-i18n="kpi_safe">符合目標年級</div>
                            <div class="text-3xl font-bold text-green-600" id="res-safe">0</div>
                        </div>
                        <div class="glass-panel p-5 rounded-2xl text-center border-b-4 border-red-400">
                            <div class="text-sm text-slate-500 mb-2 font-medium" data-i18n="kpi_risk">超前/未見</div>
                            <div class="text-3xl font-bold text-red-500" id="res-risk">0</div>
                        </div>
                    </div>

                    <div class="glass-panel p-6 rounded-3xl overflow-hidden">
                        <h3 class="font-bold text-slate-700 text-xl mb-5 flex items-center justify-between">
                            <span><i class="fa-solid fa-table-list mr-2 text-green-600"></i> <span data-i18n="table_title">詞彙年級分佈分析</span></span>
                        </h3>
                        <div class="overflow-x-auto max-h-[500px] scrollbar-thin rounded-xl border border-green-100">
                            <table class="w-full text-left border-collapse">
                                <thead class="sticky top-0 bg-green-50/90 backdrop-blur z-10">
                                    <tr class="text-slate-600 text-sm font-bold border-b border-green-200">
                                        <th class="pb-4 pt-4 pl-4" data-i18n="th_term">詞彙</th>
                                        <th class="pb-4 pt-4" data-i18n="th_pos">詞性</th>
                                        <th class="pb-4 pt-4" data-i18n="th_first">首次出現</th>
                                        <th class="pb-4 pt-4 text-center" data-i18n="th_count">次數(文本)</th>
                                        <th class="pb-4 pt-4 text-center" data-i18n="th_diff">學期差</th>
                                        <th class="pb-4 pt-4 text-center" data-i18n="th_status">判定</th>
                                    </tr>
                                </thead>
                                <tbody id="result-table-body" class="text-slate-700 text-sm font-medium bg-white/50 divide-y divide-green-50">
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <div class="glass-panel p-8 rounded-3xl border-l-8 border-green-600 bg-white/80">
                        <h3 class="font-bold text-green-800 text-2xl mb-6 flex items-center">
                            <i class="fa-solid fa-robot fa-bounce mr-3 text-green-600" style="--fa-animation-duration: 3s;"></i> <span data-i18n="ai_feedback_title">AI 深度命題回饋</span>
                        </h3>
                        <div id="ai-feedback-loader" class="hidden flex items-center text-green-700">
                            <div class="loader mr-3"></div> <span data-i18n="status_analyzing">正在生成深度分析報告，請稍候...</span>
                        </div>
                        <div id="ai-feedback-content" class="text-slate-700 leading-relaxed space-y-6 text-base"></div>
                        <div class="mt-4 flex flex-wrap gap-2">
                            <button id="manual-ai-btn" onclick="generateAiPrompt()" disabled class="text-sm bg-green-50 text-green-700 px-4 py-2 rounded-xl border border-green-200 transition disabled:opacity-50 disabled:cursor-not-allowed">
                                需要 AI 命題修正時按我
                            </button>
                            <button id="copy-ai-btn" onclick="copyAiPrompt()" class="hidden text-sm bg-slate-800 text-white px-4 py-2 rounded-xl border border-slate-700 transition">
                                複製提示詞
                            </button>
                        </div>
                        <textarea id="manual-ai-prompt" class="hidden mt-3 w-full p-4 rounded-xl bg-slate-900 text-slate-100 text-sm leading-relaxed" rows="8" readonly></textarea>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="toast" class="fixed bottom-10 left-1/2 transform -translate-x-1/2 bg-slate-800/90 backdrop-blur text-white px-6 py-3 rounded-full shadow-xl transition-all duration-300 opacity-0 translate-y-10 z-50 flex items-center gap-3 pointer-events-none border border-slate-700">
        <i id="toast-icon" class="fa-solid fa-circle-info text-yellow-400"></i>
        <span id="toast-msg">提示訊息</span>
    </div>

        function normalizeTerm(rawTerm) {
            if (!rawTerm) return "";
            return String(rawTerm).replace(/\u3000/g, " ").replace(/\s+/g, " ").trim();
        }

        function normalizePos(rawPos) {
            const pos = String(rawPos || "").trim();
            if (!pos) return "O";
            if (pos.toUpperCase() === "UNK") return "O";
            return pos;
        }

        function expandParticleTerm(term, pos) {
            const t = normalizeTerm(term);
            const p = normalizePos(pos);
            if (!t) return [];

            if (t === "的") return [{ term: "的", pos: "DE" }];

            if (t.startsWith("的") && t.length > 1) {
                const rest = t.slice(1).trim();
                const out = [{ term: "的", pos: "DE" }];
                if (isUsableTerm(rest)) out.push({ term: rest, pos: p });
                return out;
            }

            if (t.endsWith("的") && t.length > 1) {
                const stem = t.slice(0, -1).trim();
                const out = [];
                if (isUsableTerm(stem)) out.push({ term: stem, pos: p });
                out.push({ term: "的", pos: "DE" });
                return out;
            }

            return [{ term: t, pos: p }];
        }

        function isUsableTerm(term) {
            if (!term || term.length < 2) return false;
            if (/^[\d.]+$/.test(term)) return false;
            if (/^[^\u3400-\u9fffA-Za-z0-9]+$/.test(term)) return false;
            return /[\u3400-\u9fffA-Za-z]/.test(term);
        }

        function extractFallbackTerms(rawText) {
            const normalized = normalizeTerm(rawText);
            if (!normalized) return [];

            const candidates = new Set();
            const split = normalized.split(/[\s,\uFF0C\u3001;\uFF1B|]+/);
            for (const part of split) {
                const cleaned = normalizeTerm(part.replace(/[()\uFF08\uFF09\[\]{}]/g, ""));
                if (isUsableTerm(cleaned)) candidates.add(cleaned);
                const noSpace = cleaned.replace(/\s+/g, "");
                if (noSpace !== cleaned && isUsableTerm(noSpace)) candidates.add(noSpace);
            }

            const cjkChunks = normalized.match(/[\u3400-\u9fff]{2,}/g) || [];
            for (const c of cjkChunks) {
                if (isUsableTerm(c)) candidates.add(c);
            }

            return Array.from(candidates);
        }

        function extractTermPosPairs(rawText, fallbackPos = "O") {
            const text = String(rawText || "");
            const pairs = [];
            const regex = /([^()\s\u3000]+)\s*\(([A-Za-z][A-Za-z0-9_]*)\)/g;
            let m;

            while ((m = regex.exec(text)) !== null) {
                const term = normalizeTerm(m[1]);
                const pos = normalizePos(m[2]);
                if (!isUsableTerm(term) || !pos || pos.includes("CATEGORY")) continue;
                const expanded = expandParticleTerm(term, pos);
                for (const item of expanded) {
                    pairs.push([item.term, item.pos]);
                }
            }

            if (!pairs.length) {
                const terms = extractFallbackTerms(text);
                for (const term of terms) {
                    const expanded = expandParticleTerm(term, fallbackPos);
                    for (const item of expanded) {
                        pairs.push([item.term, item.pos]);
                    }
                }
            }

            return pairs;
        }

        function mergePosStats(termStats, term, pos) {

        function cacheTimelineToObject(timeline) {
            const obj = {};
            if (!timeline || !(timeline instanceof Map)) return obj;
            for (const [term, list] of timeline.entries()) {

        function objectToCacheTimeline(obj) {
            const timeline = new Map();
            if (!obj || typeof obj !== "object") return timeline;
            for (const [term, list] of Object.entries(obj)) {
                if (!Array.isArray(list)) continue;
                timeline.set(term, list

        function readCachedEntries() {
            try {

                if (!parsed || !Array.isArray(parsed.entries)) return null;

        function cacheEntries(entries, timeline) {

        function buildVocabModel(entries) {
            const merged = new Map();

            for (const item of entries || []) {
                const term = normalizeTerm((item && item.term) || (item && item[0]) || "");
                const pos = normalizePos((item && item.pos) || (item && item[1]) || "O");
                const priority = Number((item && item.priority) || 1);
                if (!isUsableTerm(term)) continue;

                const current = merged.get(term);
                if (!current) {
                    merged.set(term, { term, pos, priority });
                    continue;
                }

                if (priority > current.priority || (current.pos === "O" && pos !== "O")) {
                    merged.set(term, { term, pos, priority });
                }
            }

            const grouped = new Map();
            for (const entry of merged.values()) {
                const key = entry.term[0];
                if (!grouped.has(key)) grouped.set(key, []);
                grouped.get(key).push(entry);

                if (entry.term.includes(" ")) {
                    const noSpace = entry.term.replace(/\s+/g, "");
                    if (isUsableTerm(noSpace) && noSpace !== entry.term) {
                        if (!grouped.has(noSpace[0])) grouped.set(noSpace[0], []);
                        grouped.get(noSpace[0]).push({ term: noSpace, pos: entry.pos, priority: entry.priority });
                    }
                }
            }

            for (const list of grouped.values()) {
                list.sort((a, b) =>
                    b.term.length - a.term.length ||
                    b.priority - a.priority ||
                    a.term.localeCompare(b.term, "zh-Hant")
                );
            }

            let totalTerms = 0;
            for (const list of grouped.values()) totalTerms += list.length;
            return { grouped, totalTerms };
        }

        function mapPosGroup(pos) {
            if (/^N/.test(pos)) return "N";
            if (/^C/.test(pos)) return "C";
            if (/^D/.test(pos)) return "D";
            if (/^(VH|VA|VL|VHC|A)/.test(pos)) return "A";
            if (/^V/.test(pos)) return "V";
            return "O";
        }

        function findLongestHit(text, start, selectedGroups = null) {
            if (!vocabModel) return null;
            const entries = vocabModel.grouped.get(text[start]) || [];
            for (const entry of entries) {
                if (!text.startsWith(entry.term, start)) continue;
                if (!selectedGroups) return entry;
                const group = mapPosGroup(entry.pos);
                if (selectedGroups.has(group)) return entry;
            }
            return null;
        }

        function findForcedBoundaryHit(text, start) {
            for (const entry of FORCED_BOUNDARY_TERMS) {
                if (text.startsWith(entry.term, start)) {
                    return { term: entry.term, pos: normalizePos(entry.pos || "O") };
                }
            }
            return null;
        }

        function isSplitChar(ch) {
            return /[\s\r\n\t，。、；：、！？,.!?()（）「」『』【】《》〈〉<>"'`~\-+*/=|\\]/u.test(ch);
        }

        function segmentWithLexicon(text) {
            const tokens = [];
            let i = 0;

            while (i < text.length) {
                const ch = text[i];
                if (isSplitChar(ch)) {
                    i += 1;
                    continue;
                }

                const forcedHit = findForcedBoundaryHit(text, i);
                if (forcedHit) {
                    tokens.push({ type: "matched", value: forcedHit.term, pos: forcedHit.pos });
                    i += forcedHit.term.length;
                    continue;
                }

                const hit = findLongestHit(text, i, null);
                if (hit) {
                    tokens.push({ type: "matched", value: hit.term, pos: hit.pos });
                    i += hit.term.length;
                    continue;
                }

                let j = i + 1;
                while (j < text.length) {
                    if (isSplitChar(text[j])) break;
                    if (findForcedBoundaryHit(text, j)) break;
                    if (findLongestHit(text, j, null)) break;
                    j += 1;
                }
                tokens.push({ type: "unmatched", value: text.slice(i, j) });
                i = j;
            }
            return tokens;
        }

        function summarizeUnmatched(unmatchedTokens) {
            const count = new Map();
            for (const token of unmatchedTokens) {
                const value = token.trim();
                if (!value || value.length < 2) continue;
                count.set(value, (count.get(value) || 0) + 1);
            }
            return Array.from(count.entries())
                .map(([value, c]) => ({ value, count: c }))
                .sort((a, b) => b.count - a.count || b.value.length - a.value.length || a.value.localeCompare(b.value, "zh-Hant"));
        }

        function parseGradeNumber(gradeText) {
            const text = String(gradeText || "").trim();
            if (!text) return NaN;
            const direct = Number(text);
            if (Number.isFinite(direct)) return direct;

            const arabic = text.match(/\d+/);
            if (arabic) return Number(arabic[0]);

            const zhMap = {
                "三年級": 3, "四年級": 4, "五年級": 5, "六年級": 6,
                "七年級": 7, "八年級": 8, "九年級": 9
            };
            return Number(zhMap[text] || NaN);
        }

        function getTargetSemesterIndex(context) {
            const gradeNum = parseGradeNumber(context.grade);
            if (!Number.isFinite(gradeNum)) return Number.POSITIVE_INFINITY;
            const sem = context.semester ? normalizeSemester(context.semester) : "下";
            return toSemesterIndex(gradeNum, sem);
        }

        function formatOccurrence(occ) {
            const publisher = occ.publisher || "版本未標示";
            const semText = occ.semester === "下" ? "下學期" : "上學期";
            return `${publisher}${occ.grade}年級${semText}`;
        }

        function resolveTermTiming(term, context) {
            const occurrences = termTimelineModel.get(term) || [];
            const filtered = occurrences.filter((occ) => {
                if (context.version && occ.publisher !== context.version) return false;
                return true;
            });

            if (!filtered.length) return null;
            const minIndex = filtered.reduce((best, occ) => Math.min(best, occ.index), filtered[0].index);
            const earliest = filtered.filter((occ) => occ.index === minIndex);
            if (!earliest.length) return null;

            const first = earliest[0];
            if (context.version) return first;

            const publishers = Array.from(new Set(
                earliest
                    .map((occ) => String(occ.publisher || "").trim())
                    .filter(Boolean)
            )).sort((a, b) => a.localeCompare(b, "zh-Hant"));

            if (publishers.length <= 1) {
                return first;
            }

            return {
                ...first,
                publisher: publishers.join("/")
            };
        }

        function evaluateTermState(term, context) {
            const firstOcc = resolveTermTiming(term, context);
            if (!firstOcc) {
                return { first: "未見", diff: -100, state: "missing" };
            }

            const targetIndex = getTargetSemesterIndex(context);
            if (!Number.isFinite(targetIndex)) {
                return { first: formatOccurrence(firstOcc), diff: 0, state: "fit" };
            }

            const diff = targetIndex - firstOcc.index;
            if (diff >= 0) {
                return { first: formatOccurrence(firstOcc), diff, state: "fit" };
            }
            if (diff === -1) {
                return { first: formatOccurrence(firstOcc), diff, state: "next_sem" };
            }
            return { first: formatOccurrence(firstOcc), diff, state: "risk" };
        }

        function analyzeByLexicon(text, posFilter, context) {
            const selectedGroups = new Set(posFilter && posFilter.length ? posFilter : ["N", "V", "A", "D", "C", "O"]);
            const tokens = segmentWithLexicon(text);

            const matchedMap = new Map();
            const unmatched = [];

            for (const token of tokens) {
                if (token.type === "matched") {
                    if (!selectedGroups.has(mapPosGroup(token.pos))) {
                        continue;
                    }
                    const key = `${token.value}||${token.pos}`;
                    matchedMap.set(key, (matchedMap.get(key) || 0) + 1);
                } else if (token.type === "unmatched") {
                    unmatched.push(token.value);
                }
            }

            const table = [];
            for (const [key, count] of matchedMap.entries()) {
                const [term, pos] = key.split("||");
                const evalState = evaluateTermState(term, context);
                table.push({
                    term,
                    pos: normalizePos(pos),
                    first: evalState.first,
                    count,
                    diff: evalState.diff,
                    state: evalState.state
                });
            }

            const unmatchedSummary = summarizeUnmatched(unmatched);
            if (selectedGroups.has("O")) {
                for (const item of unmatchedSummary) {
                    table.push({
                        term: item.value,
                        pos: "O",
                        first: "待確認詞彙",
                        count: item.count,
                        diff: -100,
                        state: "missing"
                    });
                }
            }

            table.sort((a, b) => {
                const ar = a.state === "risk" ? 1 : 0;
                const br = b.state === "risk" ? 1 : 0;
                return ar - br || a.term.localeCompare(b.term, "zh-Hant");
            });

            const total = table.length;
            const safe = table.filter((x) => x.state === "fit").length;
            const risk = total - safe;
            const score = total ? Math.round((safe / total) * 100) : 100;
            const checkList = unmatchedSummary.slice(0, 10).map((x) => `${x.value}（${x.count}次）`);

            return {
                summary: {
                    score,
                    scoreFormula: `${safe}/${total || 1} × 100`,
                    total,
                    safe,
                    risk
                },
                table,
                aiFeedback: `
                    <div class="space-y-3">
                        <p><strong>詞彙檢測已完成。</strong> 請優先檢查下列待確認詞彙是否需調整用語。</p>
                        <p>建議優先檢查：${checkList.length ? checkList.join("、") : "無"}</p>
                        <p class="text-slate-500">若需要協助，可使用下方按鈕產生 AI 修題提示詞。</p>
                    </div>
                `
            };
        }

        async function runAnalysis() {
            const stage = document.getElementById('stage').value;
            const text = document.getElementById('text').value.trim();
            const t = translations[currentLang] || translations["zh-TW"];

            if (!stage) { showToast(t.msg_select_stage, "warning"); return; }
            if (!text) { showToast(t.msg_input_text, "warning"); return; }

            const btn = document.getElementById('runBtn');
            const originalBtnContent = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = `<div class="loader mr-3"></div> ${t.status_analyzing}`;

            document.getElementById('result-area').classList.remove('hidden');
            document.getElementById('ai-feedback-content').innerHTML = "";
            document.getElementById('ai-feedback-loader').classList.remove('hidden');
            document.getElementById('result-table-body').innerHTML = `<tr><td colspan="6" class="text-center py-8 text-slate-500 italic">${t.status_analyzing}</td></tr>`;
            document.getElementById('result-area').scrollIntoView({ behavior: 'smooth' });

            try {
                if (!vocabModel) throw new Error("分析資料尚未就緒，請稍後再試");
                const posFilter = Array.from(document.querySelectorAll('input[name="pos"]:checked')).map(cb => cb.value);
                const context = {
                    stage,
                    grade: document.getElementById('grades').value || "",
                    semester: document.getElementById('semester').value || "",
                    version: document.getElementById('version').value || ""
                };
                const localResult = analyzeByLexicon(text, posFilter, context);
                renderResults(localResult);
                lastAnalysisContext = {
                    text,
                    stage,
                    grade: context.grade,
                    semester: context.semester,
                    version: context.version,
                    result: localResult
                };
                document.getElementById('manual-ai-btn').disabled = false;
                showToast(t.msg_analysis_done, "success");
            } catch (error) {
                showToast(t.msg_analysis_fail + error.message, "error");
                document.getElementById('ai-feedback-content').innerHTML = `<p class="text-red-500">分析失敗：${escapeHtml(error.message)}</p>`;
                document.getElementById('manual-ai-btn').disabled = true;
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalBtnContent;
                document.getElementById('ai-feedback-loader').classList.add('hidden');
            }
        }

        function renderResults(data) {
            document.getElementById('res-score').innerText = data.summary.score;
            document.getElementById('res-score-detail').innerText = data.summary.scoreFormula || "無扣分資料";
            document.getElementById('res-total').innerText = data.summary.total;
            document.getElementById('res-safe').innerText = data.summary.safe;
            document.getElementById('res-risk').innerText = data.summary.risk;
            document.getElementById('ai-feedback-content').innerHTML = data.aiFeedback;
            document.getElementById('copy-ai-btn').classList.add('hidden');
            document.getElementById('manual-ai-prompt').classList.add('hidden');
            document.getElementById('manual-ai-prompt').value = "";

            const tbody = document.getElementById('result-table-body');
            if (data.table.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center py-8 text-slate-500">沒有符合篩選條件的詞彙。</td></tr>';
                return;
            }

            tbody.innerHTML = data.table.map((item, index) => {
                let badgeClass = "bg-slate-400";
                let statusText = "未知";
                let diffText = "N/A";

                if (item.diff > -99) {
                    diffText = (item.diff > 0 ? "+" : "") + item.diff;
                    if (item.state === "fit") {
                        badgeClass = "bg-safe-light";
                        statusText = "符合";
                    } else if (item.state === "next_sem") {
                        badgeClass = "bg-warn";
                        statusText = "下學期";
                    } else if (item.state === "risk") {
                        badgeClass = "bg-danger";
                        statusText = "超前";
                    }
                } else {
                    badgeClass = "bg-danger";
                    statusText = item.state === "missing" ? "未見" : "待確認";
                    diffText = "-";
                }

                const rowClass = index % 2 === 0 ? 'bg-white/50' : 'bg-green-50/30';
                return `
                <tr class="${rowClass} hover:bg-green-100/50 transition duration-150">
                    <td class="py-3 pl-4 font-bold text-slate-700">${escapeHtml(item.term)}</td>
                    <td class="py-3 font-mono text-sm text-slate-500">${escapeHtml(item.pos)}</td>
                    <td class="py-3 text-slate-600 text-sm">${escapeHtml(item.first)}</td>
                    <td class="py-3 text-center font-mono text-slate-700">${escapeHtml(item.count != null ? item.count : 0)}</td>
                    <td class="py-3 font-mono font-bold text-center text-slate-700" title="相差學期數">${escapeHtml(diffText)}</td>
                    <td class="py-3 text-center">
                        <span class="${badgeClass} text-white text-xs px-3 py-1 rounded-full shadow-sm font-bold inline-block min-w-[60px]">
                            ${statusText}
                        </span>
                    </td>
                </tr>`;
            }).join('');
        }

        function normalizeAiHtml(rawText) {
            const text = String(rawText || "")
                .replace(/```html/gi, "")
                .replace(/```/g, "")
                .trim();
            if (!text) return "";
            if (/<[a-z][\s\S]*>/i.test(text)) return text;
            return `<div class="space-y-3">${text.split(/\r?\n+/).map((line) => `<p>${escapeHtml(line)}</p>`).join("")}</div>`;
        }

        async function requestAiRevision(promptText) {
            if (!AI_REVIEW_URL) {
                throw new Error("AI 修題服務未設定");
            }

            const payloadContext = {
                text: lastAnalysisContext.text,
                stage: lastAnalysisContext.stage,
                grade: lastAnalysisContext.grade || "",
                semester: lastAnalysisContext.semester || "",
                version: lastAnalysisContext.version || "",
                posFilter: Array.from(document.querySelectorAll('input[name="pos"]:checked')).map(cb => cb.value)
            };

            const attempts = [
                { action: "chat_with_ai", prompt: promptText },
                { action: "chat_with_ai", prompt: promptText, payload: payloadContext },
                { action: "analyze", payload: payloadContext },
                { action: "aiReview", payload: { ...payloadContext, prompt: promptText } },
                { prompt: promptText }
            ];

            let lastError = null;
            for (const body of attempts) {
                try {
                    const response = await fetch(AI_REVIEW_URL, {
                        method: "POST",
                        headers: { "Content-Type": "text/plain;charset=utf-8" },
                        body: JSON.stringify(body)
                    });

                    const raw = await response.text();
                    let parsed = null;
                    try {
                        parsed = JSON.parse(raw);
                    } catch {
                        parsed = null;
                    }

                    if (parsed && parsed.status === "success" && parsed.data?.aiFeedback) {
                        return parsed.data.aiFeedback;
                    }
                    if (parsed && parsed.status === "success" && typeof parsed.data === "string") {
                        const html = normalizeAiHtml(parsed.data);
                        if (html) return html;
                    }
                    if (parsed && parsed.status === "success" && parsed.data?.content?.parts?.[0]?.text) {
                        const html = normalizeAiHtml(parsed.data.content.parts[0].text);
                        if (html) return html;
                    }
                    if (parsed && parsed.candidates?.[0]?.content?.parts?.[0]?.text) {
                        const html = normalizeAiHtml(parsed.candidates[0].content.parts[0].text);
                        if (html) return html;
                    }
                    if (parsed && parsed.data?.text) {
                        const html = normalizeAiHtml(parsed.data.text);
                        if (html) return html;
                    }
                    if (parsed && parsed.text) {
                        const html = normalizeAiHtml(parsed.text);
                        if (html) return html;
                    }

                    const message = parsed?.message || raw || "AI 服務暫時不可用";
                    if (/Unknown action/i.test(String(message))) {
                        lastError = new Error(message);
                        continue;
                    }
                    throw new Error(message);
                } catch (error) {
                    lastError = error;
                }
            }

            throw lastError || new Error("AI 修題服務暫時不可用");
        }

        async function generateAiPrompt() {
            if (!lastAnalysisContext) {
                showToast("請先完成一次詞彙檢測。", "warning");
                return;
            }
            const unmatched = lastAnalysisContext.result.table
                .filter((x) => x.state === "risk" || x.state === "missing")
                .map((x) => x.term)
                .slice(0, 20);

            lastAiPrompt = [
                "你是自然科命題修稿助理，請根據以下資料提出修正版本：",
                `學習階段：${lastAnalysisContext.stage}`,
                `目標年級：${lastAnalysisContext.grade || "未指定"}`,
                `目標學期：${lastAnalysisContext.semester || "未指定"}`,
                `教科書版本：${lastAnalysisContext.version || "未指定"}`,
                "",
                "原始試題：",
                lastAnalysisContext.text,
                "",
                `待確認片段：${unmatched.length ? unmatched.join("、") : "無"}`,
                "",
                "請輸出：",
                "1) 是否建議修正",
                "2) 修正理由",
                "3) 修正後完整題目"
            ].join("\n");

            const textarea = document.getElementById('manual-ai-prompt');
            textarea.value = lastAiPrompt;
            textarea.classList.remove('hidden');
            document.getElementById('copy-ai-btn').classList.remove('hidden');

            const loader = document.getElementById('ai-feedback-loader');
            loader.classList.remove('hidden');

            try {
                const aiHtml = await requestAiRevision(lastAiPrompt);
                document.getElementById('ai-feedback-content').innerHTML = aiHtml;
                showToast("AI 修題建議已產生。", "success");
            } catch (error) {
                showToast(`AI 修題服務暫時不可用：${error.message}`, "error");
                document.getElementById('ai-feedback-content').innerHTML = `
                    <div class="space-y-2 text-slate-600">
                        <p>目前無法連線至 AI 修題服務，已保留提示詞供手動使用。</p>
                        <p class="text-slate-500 text-sm">可按「複製提示詞」貼到 Gemini / 其他 AI 工具。</p>
                    </div>
                `;
            } finally {
                loader.classList.add('hidden');
            }
        }

        function copyAiPrompt() {
            if (!lastAiPrompt) return;
            const textarea = document.getElementById('manual-ai-prompt');
            textarea.select();
            document.execCommand("copy");
            showToast("提示詞已複製。", "success");
        }

        function setAiPanelIdle() {
            document.getElementById('ai-feedback-content').innerHTML = `
                <p class="text-slate-600">先完成詞彙檢測，再決定是否需要修題建議。</p>
                <p class="text-slate-500">分析完成後按下按鈕，系統會嘗試連線 AI 產生修題建議。</p>
            `;
            document.getElementById('manual-ai-btn').disabled = true;
            document.getElementById('copy-ai-btn').classList.add('hidden');
            document.getElementById('manual-ai-prompt').classList.add('hidden');
            document.getElementById('manual-ai-prompt').value = "";
        }

        function escapeHtml(str) {
            return String(str)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function showToast(msg, type = "info") {
            const toast = document.getElementById('toast');
            const icon = document.getElementById('toast-icon');
            const msgEl = document.getElementById('toast-msg');

            msgEl.innerText = msg;
            toast.className = toast.className.replace(/bg-\w+-800\/90/, '').replace(/border-\w+-700/, '');
            icon.className = icon.className.replace(/text-\w+-400/, '');

            if (type === "success") {
                toast.classList.add('bg-green-800/90', 'border-green-700');
                icon.classList.add('fa-circle-check', 'text-green-400');
            } else if (type === "warning") {
                toast.classList.add('bg-yellow-800/90', 'border-yellow-700');
                icon.classList.add('fa-triangle-exclamation', 'text-yellow-400');
            } else if (type === "error") {
                toast.classList.add('bg-red-800/90', 'border-red-700');
                icon.classList.add('fa-circle-xmark', 'text-red-400');
            } else {
                toast.classList.add('bg-slate-800/90', 'border-slate-700');
                icon.classList.add('fa-circle-info', 'text-blue-400');
            }
            
            toast.classList.remove('opacity-0', 'translate-y-10');
            setTimeout(() => { toast.classList.add('opacity-0', 'translate-y-10'); }, 3000);
        }

        // Canvas Background
        window.addEventListener('load', function() {
            const canvas = document.getElementById('network-canvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            let width, height, orbits = [], centerX, centerY;

            function resize() { 
                width = window.innerWidth; 
                height = window.innerHeight; 
                canvas.width = width; 
                canvas.height = height; 
                centerX = width / 2; 
                centerY = height / 2; 
                initOrbits(); 
            }

            class Orbit { 
                constructor(rx, ry, a, c, s) { 
                    this.rx = rx; this.ry = ry; this.a = a; this.c = c; this.s = s; this.r = 0; this.ea = Math.random() * Math.PI * 2; 
                } 
                update() { this.r += this.s; this.ea += 0.002; } 
                draw() { 
                    ctx.save(); ctx.translate(centerX, centerY); ctx.rotate(this.a); 
                    ctx.beginPath(); ctx.ellipse(0, 0, this.rx, this.ry, this.r, 0, Math.PI * 2); 
                    ctx.strokeStyle = this.c; ctx.lineWidth = 1; ctx.stroke(); 
                    ctx.beginPath(); ctx.arc(this.rx * Math.cos(this.ea), this.ry * Math.sin(this.ea), 3, 0, Math.PI * 2); 
                    ctx.fillStyle = this.c; ctx.fill(); ctx.restore(); 
                } 
            }

            function initOrbits() { 
                orbits = []; 
                const br = width < height ? width * 0.25 : height * 0.3; 
                orbits.push(new Orbit(br, br * 0.4, Math.PI / 4, 'rgba(34,197,94,0.3)', 0.001)); 
                orbits.push(new Orbit(br, br * 0.4, -Math.PI / 4, 'rgba(16,185,129,0.3)', -0.001)); 
                orbits.push(new Orbit(br * 1.2, br * 1.2, 0, 'rgba(6,95,70,0.1)', 0.0005)); 
            }

            function animate() { 
                ctx.clearRect(0, 0, width, height); 
                orbits.forEach(o => { o.update(); o.draw() }); 
                ctx.beginPath(); ctx.arc(centerX, centerY, 5, 0, Math.PI * 2); 
                ctx.fillStyle = 'rgba(34,197,94,0.8)'; ctx.shadowBlur = 15; ctx.shadowColor = '#22c55e'; ctx.fill(); 
                requestAnimationFrame(animate); 
            }

            window.addEventListener('resize', resize); 
            resize(); 
            animate();
        });
    </script>
