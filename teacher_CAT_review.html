<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>教師後台｜AI 診斷報表</title>
  <style>
    /* === 1. 基本樣式 (CSS) === */
    body { font-family: "Microsoft JhengHei", sans-serif; background: #f4f6f9; margin: 0; padding: 20px; }
    .container { max-width: 1000px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    
    h1 { text-align: center; color: #2c3e50; margin-bottom: 30px; }

    /* 登入區塊 */
    .login-box { text-align: center; margin-bottom: 20px; padding: 20px; background: #ecf0f1; border-radius: 8px; }
    input[type="password"] { padding: 10px; width: 200px; border: 1px solid #bdc3c7; border-radius: 4px; font-size: 16px; }
    button.btn-primary { padding: 10px 20px; background: #3498db; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; transition: 0.3s; }
    button.btn-primary:hover { background: #2980b9; }
    button.btn-primary:disabled { opacity: 0.7; cursor: wait; }
    .helper-text { color: #5d6d7e; font-size: 14px; margin-top: 12px; line-height: 1.6; }
    .alert-banner { display: none; margin: 0 0 20px; padding: 14px 16px; border-radius: 8px; line-height: 1.6; }
    .alert-info { background: #eef6ff; border: 1px solid #b7d8f8; color: #22577a; }
    .alert-warn { background: #fff4e5; border: 1px solid #f5c97a; color: #8a4b08; }
    code { background: rgba(15, 23, 42, 0.08); padding: 2px 6px; border-radius: 4px; }

    /* 表格區塊 */
    #dashboard { display: none; } /* 預設隱藏，登入後顯示 */
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #ddd; }
    th { background-color: #34495e; color: #fff; white-space: nowrap; }
    tr:hover { background-color: #f1f1f1; cursor: pointer; }
    .score-badge { display: inline-block; padding: 4px 8px; border-radius: 12px; color: #fff; font-weight: bold; font-size: 0.9em; }
    .high { background-color: #27ae60; }
    .mid { background-color: #f39c12; }
    .low { background-color: #e74c3c; }

    /* 彈出視窗 (Modal) */
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
    .modal-content { background: #fff; width: 90%; max-width: 600px; max-height: 80vh; overflow-y: auto; padding: 25px; border-radius: 8px; position: relative; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
    .close-btn { position: absolute; top: 15px; right: 20px; font-size: 24px; cursor: pointer; color: #aaa; }
    .close-btn:hover { color: #333; }
    .modal-header { font-size: 1.2em; font-weight: bold; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 15px; color: #2c3e50; }
    
    /* 診斷內容樣式 */
    .diag-section { margin-bottom: 20px; }
    .diag-title { font-weight: bold; color: #e67e22; margin-bottom: 8px; font-size: 1.1em; }
    .action-list { padding-left: 20px; }
    .action-list li { margin-bottom: 8px; line-height: 1.6; }
    .loading { text-align: center; color: #7f8c8d; font-style: italic; display: none; margin-top: 10px; }
  </style>
  <script src="./assets/js/aischool-shared.js"></script>
</head>
<body>

<div class="container">
  <h1>👨‍🏫 教師後台：AI 學習診斷儀表板</h1>
  <div id="endpointNotice" class="alert-banner"></div>

  <div class="login-box" id="loginSection">
    <p>請輸入教師通關密碼</p>
    <input type="password" id="teacherPwd" placeholder="輸入密碼 (預設: admin)">
    <button id="teacherLoginBtn" class="btn-primary" onclick="fetchTeacherData()">登入查詢</button>
    <div id="loadingText" class="loading">資料讀取中，請稍候...</div>
    <div class="helper-text">
      此頁會讀取 CAT 測驗的教師檢視報表。若看到後端設定提示，代表前端已準備好，但仍需要對應的 Apps Script Web App 支援 <code>get_teacher_data</code>。
    </div>
  </div>

  <div id="dashboard">
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <h3>學生測驗紀錄列表</h3>
      <button class="btn-primary" onclick="location.reload()" style="background:#95a5a6; font-size:14px;">重新整理</button>
    </div>
    <table id="reportTable">
      <thead>
        <tr>
          <th>時間</th>
          <th>座號/ID</th>
          <th>得分</th>
          <th>能力值(θ)</th>
          <th>AI 總結摘要</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody>
        </tbody>
    </table>
  </div>
</div>

<div id="detailModal" class="modal-overlay" onclick="closeModal(event)">
  <div class="modal-content">
    <span class="close-btn" onclick="closeModal(event)">&times;</span>
    <div class="modal-header" id="modalTitle">學生詳情</div>
    <div id="modalBody">
      </div>
  </div>
</div>

<script>
  /* === 2. JavaScript 邏輯 === */
  const teacherCatEndpoint = window.AISchool?.getGasUrlInfo?.("teacherCatReview") || {
    url: window.AISchool?.getGasUrl?.("teacherCatReview") || "",
    source: "legacy",
    fallbackKey: "",
    isConfigured: Boolean(window.AISchool?.getGasUrl?.("teacherCatReview")),
    isPlaceholder: !window.AISchool?.getGasUrl?.("teacherCatReview")
  };
  const GAS_URL = teacherCatEndpoint.url;

  function setLoading(isLoading) {
    const loadingText = document.getElementById('loadingText');
    const loginButton = document.getElementById('teacherLoginBtn');

    if (loadingText) {
      loadingText.style.display = isLoading ? 'block' : 'none';
    }
    if (loginButton) {
      loginButton.disabled = isLoading;
      loginButton.textContent = isLoading ? '讀取中...' : '登入查詢';
    }
  }

  function renderEndpointNotice() {
    const notice = document.getElementById('endpointNotice');
    if (!notice) return;

    notice.style.display = 'none';
    notice.className = 'alert-banner';

    if (!teacherCatEndpoint.isConfigured || !GAS_URL) {
      notice.classList.add('alert-warn');
      notice.innerHTML = '尚未設定教師 CAT 報表後端。請先在 <code>assets/js/aischool-shared.js</code> 的 <code>teacherCatReview</code> 放入真實 Apps Script Web App URL，或透過 shared runtime 覆寫。';
      notice.style.display = 'block';
      return;
    }

    if (String(teacherCatEndpoint.source).startsWith('fallback:')) {
      notice.classList.add('alert-info');
      notice.innerHTML = '目前此頁預設共用學生 CAT 後端 <code>' + teacherCatEndpoint.fallbackKey + '</code>。這是依照本地資料契約推得的最佳預設值；若你有獨立的教師報表部署，請把 <code>teacherCatReview</code> 改成實際 URL。';
      notice.style.display = 'block';
    }
  }

  function parseMaybeJson(raw) {
    if (typeof raw !== 'string') return null;
    try {
      return JSON.parse(raw);
    } catch {
      return null;
    }
  }

  function normalizeFeedback(raw) {
    if (!raw) {
      return { summary: '', weakness_analysis: '', action_plan: [] };
    }

    if (typeof raw === 'string') {
      const parsed = parseMaybeJson(raw);
      if (parsed) {
        return normalizeFeedback(parsed);
      }
      return { summary: '', weakness_analysis: raw.trim(), action_plan: [] };
    }

    const obj = typeof raw === 'object' ? raw : {};
    let actionPlan = [];

    if (Array.isArray(obj.action_plan)) {
      actionPlan = obj.action_plan;
    } else if (typeof obj.action_plan === 'string') {
      actionPlan = obj.action_plan.split(/\n|；|;/).map(item => item.trim()).filter(Boolean);
    }

    return {
      ...obj,
      summary: String(obj.summary || obj.ai_summary || '').trim(),
      weakness_analysis: String(obj.weakness_analysis || obj.weaknessAnalysis || obj.analysis || '').trim(),
      action_plan: actionPlan.map(item => String(item || '').trim()).filter(Boolean)
    };
  }

  function normalizeReportRow(row) {
    const source = row && typeof row === 'object' ? row : {};
    const feedback = normalizeFeedback(source.full_feedback || source.ai_feedback || source.feedback || source.analysis || {});
    const numericScore = Number(source.score ?? source.score_100 ?? source.totalScore);

    return {
      ...source,
      timestamp: source.timestamp || source.createdAt || source.created_at || source.date || '',
      student_id: source.student_id || source.studentId || source.student || source.email || '未命名學生',
      score: Number.isFinite(numericScore) ? numericScore : String(source.score ?? source.score_100 ?? '--'),
      theta: source.theta ?? source.ability ?? source.ability_value ?? '--',
      summary: String(source.summary || feedback.summary || source.ai_summary || '').trim(),
      full_feedback: feedback
    };
  }

  function formatTime(value) {
    const date = new Date(value);
    if (Number.isNaN(date.getTime())) {
      return value ? String(value) : '—';
    }

    return date.toLocaleString('zh-TW', {
      month: 'numeric',
      day: 'numeric',
      hour: '2-digit',
      minute: '2-digit'
    });
  }

  function buildCell(tagName, text, className) {
    const cell = document.createElement(tagName);
    if (className) {
      cell.className = className;
    }
    if (text !== undefined && text !== null) {
      cell.textContent = String(text);
    }
    return cell;
  }

  function fetchTeacherData() {
    const pwd = document.getElementById('teacherPwd').value.trim();
    if (!pwd) {
      alert('請輸入密碼！');
      return;
    }

    if (!teacherCatEndpoint.isConfigured || !GAS_URL) {
      alert('教師 CAT 報表後端尚未設定完成，請先在 shared runtime 放入可用的 Apps Script Web App URL。');
      return;
    }

    setLoading(true);

    const apiUrl = `${GAS_URL}?action=get_teacher_data&password=${encodeURIComponent(pwd)}`;

    fetch(apiUrl, {
      method: 'GET',
      headers: { Accept: 'application/json' },
      redirect: 'follow'
    })
      .then(async (res) => {
        const text = await res.text();
        let data = {};

        try {
          data = text ? JSON.parse(text) : {};
        } catch {
          throw new Error('後端沒有回傳 JSON，請確認 GAS Web App 已正確部署並允許瀏覽器讀取。');
        }

        if (!res.ok) {
          throw new Error(data.error || `HTTP ${res.status}`);
        }

        return data;
      })
      .then((data) => {
        setLoading(false);

        if (!data || data.ok === false) {
          alert('錯誤：' + (data?.error || '無法讀取資料'));
          return;
        }

        const reports = Array.isArray(data.reports) ? data.reports.map(normalizeReportRow) : [];
        if (reports.length === 0) {
          alert('目前尚無學生測驗資料。');
          return;
        }

        document.getElementById('loginSection').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';

        renderTable(reports);
      })
      .catch((err) => {
        setLoading(false);
        alert('連線失敗，請檢查教師 CAT 後端設定或網路狀態。\n' + (err?.message || err));
      });
  }

  function renderTable(reports) {
    const tbody = document.querySelector('#reportTable tbody');
    tbody.innerHTML = '';

    reports.forEach((row) => {
      const tr = document.createElement('tr');
      const badgeClass = Number(row.score) >= 80 ? 'high' : Number(row.score) >= 60 ? 'mid' : 'low';

      const timeCell = buildCell('td', formatTime(row.timestamp));
      const studentCell = buildCell('td');
      const studentStrong = document.createElement('strong');
      studentStrong.textContent = row.student_id;
      studentCell.appendChild(studentStrong);

      const scoreCell = buildCell('td');
      const scoreBadge = document.createElement('span');
      scoreBadge.className = `score-badge ${badgeClass}`;
      scoreBadge.textContent = String(row.score);
      scoreCell.appendChild(scoreBadge);

      const thetaCell = buildCell('td', row.theta);
      const summaryCell = buildCell('td', row.summary || '(無摘要)');
      summaryCell.style.color = '#555';
      summaryCell.style.maxWidth = '300px';
      summaryCell.style.overflow = 'hidden';
      summaryCell.style.textOverflow = 'ellipsis';
      summaryCell.style.whiteSpace = 'nowrap';
      summaryCell.title = row.summary || '(無摘要)';

      const actionCell = buildCell('td');
      const detailButton = document.createElement('button');
      detailButton.type = 'button';
      detailButton.textContent = '查看處方籤';
      detailButton.style.padding = '5px 10px';
      detailButton.style.cursor = 'pointer';
      detailButton.addEventListener('click', (event) => {
        event.stopPropagation();
        showDetail(row);
      });
      actionCell.appendChild(detailButton);

      [timeCell, studentCell, scoreCell, thetaCell, summaryCell, actionCell].forEach((cell) => tr.appendChild(cell));

      tr.addEventListener('click', () => showDetail(row));
      tbody.appendChild(tr);
    });
  }

  function createSection(titleText) {
    const section = document.createElement('div');
    section.className = 'diag-section';

    const title = document.createElement('div');
    title.className = 'diag-title';
    title.textContent = titleText;
    section.appendChild(title);

    return section;
  }

  function showDetail(row) {
    const modal = document.getElementById('detailModal');
    const title = document.getElementById('modalTitle');
    const body = document.getElementById('modalBody');

    title.innerText = `學生：${row.student_id} (得分:${row.score})`;

    const feedback = normalizeFeedback(row.full_feedback || {});
    const weakness = feedback.weakness_analysis || '無弱點分析';
    const plans = feedback.action_plan.length ? feedback.action_plan : ['無具體建議'];

    body.innerHTML = '';

    const weaknessSection = createSection('🔍 弱點診斷與迷思概念');
    const weaknessContent = document.createElement('div');
    weaknessContent.style.whiteSpace = 'pre-line';
    weaknessContent.style.color = '#34495e';
    weaknessContent.style.background = '#f9f9f9';
    weaknessContent.style.padding = '10px';
    weaknessContent.style.borderRadius = '5px';
    weaknessContent.textContent = weakness;
    weaknessSection.appendChild(weaknessContent);

    const actionSection = createSection('💊 AI 學習處方籤 (Action Plan)');
    const planList = document.createElement('ul');
    planList.className = 'action-list';
    plans.forEach((plan) => {
      const item = document.createElement('li');
      item.textContent = plan;
      planList.appendChild(item);
    });
    actionSection.appendChild(planList);

    body.appendChild(weaknessSection);
    body.appendChild(actionSection);
    modal.style.display = 'flex';
  }

  function closeModal(e) {
    if (e.target.id === 'detailModal' || e.target.classList.contains('close-btn')) {
      document.getElementById('detailModal').style.display = 'none';
    }
  }

  renderEndpointNotice();
</script>

</body>
</html>
