<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#f4efe6">
  <title>Chat_bot</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f1e8;
      --paper: #fffaf2;
      --paper-strong: #fffdf8;
      --ink: #2f2a24;
      --muted: #7d7468;
      --line: #ded4c6;
      --accent: #8f7a5f;
      --accent-dark: #5f4e3d;
      --soft: #ebe2d4;
      --user: #d9eadf;
      --bot: #fffdf8;
      --danger: #9f4a3f;
      --shadow: 0 24px 70px rgba(73, 58, 41, 0.14);
      --radius-lg: 28px;
      --radius-md: 20px;
      --radius-sm: 14px;
      font-family: "Noto Sans TC", "Microsoft JhengHei", "PingFang TC", system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.92), transparent 34rem),
        linear-gradient(135deg, #f4efe6 0%, #eee4d7 48%, #f8f5ef 100%);
      color: var(--ink);
      letter-spacing: 0;
    }

    button,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .shell {
      min-height: 100%;
      display: grid;
      place-items: center;
      padding: 28px;
    }

    .chat {
      width: min(1080px, 100%);
      height: min(860px, calc(100vh - 56px));
      min-height: 620px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      overflow: hidden;
      background: rgba(255, 250, 242, 0.88);
      border: 1px solid rgba(222, 212, 198, 0.9);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 22px 24px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 253, 248, 0.72);
    }

    .identity {
      display: flex;
      align-items: center;
      min-width: 0;
      gap: 14px;
    }

    .avatar {
      width: 48px;
      height: 48px;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      border-radius: 18px;
      background: #e9dfcf;
      color: var(--accent-dark);
      font-weight: 800;
      box-shadow: inset 0 0 0 1px rgba(95, 78, 61, 0.08);
    }

    .name {
      margin: 0;
      font-size: 21px;
      line-height: 1.2;
      font-weight: 800;
    }

    .subtitle {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.4;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      flex: 0 0 auto;
      padding: 9px 12px;
      border-radius: 999px;
      background: #eee6da;
      color: var(--accent-dark);
      font-size: 13px;
      white-space: nowrap;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #71936e;
      box-shadow: 0 0 0 4px rgba(113, 147, 110, 0.13);
    }

    .messages {
      overflow-y: auto;
      padding: 26px 24px 18px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar {
      width: 10px;
    }

    .messages::-webkit-scrollbar-thumb {
      background: #d5cab9;
      border-radius: 999px;
      border: 3px solid var(--bg);
    }

    .day {
      display: flex;
      justify-content: center;
      margin: 3px 0 20px;
      color: var(--muted);
      font-size: 13px;
    }

    .row {
      display: flex;
      margin: 12px 0;
    }

    .row.user {
      justify-content: flex-end;
    }

    .bubble {
      max-width: min(720px, 82%);
      padding: 14px 16px 11px;
      border: 1px solid rgba(222, 212, 198, 0.9);
      border-radius: 22px;
      line-height: 1.75;
      font-size: 16px;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      box-shadow: 0 8px 22px rgba(73, 58, 41, 0.07);
    }

    .row.bot .bubble {
      background: var(--bot);
      border-top-left-radius: 8px;
    }

    .row.user .bubble {
      background: var(--user);
      border-color: #c1d8c9;
      border-top-right-radius: 8px;
    }

    .meta {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.2;
    }

    .composer {
      padding: 18px 20px 20px;
      border-top: 1px solid var(--line);
      background: rgba(255, 253, 248, 0.84);
    }

    .input-wrap {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: end;
      gap: 10px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 26px;
      background: var(--paper-strong);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.75);
    }

    textarea {
      width: 100%;
      max-height: 150px;
      min-height: 48px;
      resize: none;
      border: 0;
      outline: none;
      padding: 12px 4px;
      background: transparent;
      color: var(--ink);
      line-height: 1.55;
      font-size: 16px;
    }

    textarea::placeholder {
      color: #9a9084;
    }

    .icon-btn {
      width: 48px;
      height: 48px;
      display: grid;
      place-items: center;
      border-radius: 18px;
      color: var(--accent-dark);
      background: var(--soft);
      transition: transform 150ms ease, background 150ms ease, color 150ms ease;
    }

    .icon-btn:hover {
      transform: translateY(-1px);
      background: #e1d4c2;
    }

    .icon-btn:disabled {
      cursor: not-allowed;
      opacity: 0.55;
      transform: none;
    }

    .send {
      background: var(--accent-dark);
      color: #fffaf2;
    }

    .send:hover {
      background: #4c3f32;
    }

    .recording {
      background: #f1d6d0;
      color: var(--danger);
      animation: pulse 1.4s infinite;
    }

    .note {
      min-height: 18px;
      margin: 9px 14px 0;
      color: var(--muted);
      font-size: 13px;
    }

    .note.error {
      color: var(--danger);
    }

    .typing {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 0;
    }

    .typing span {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: #9b8b78;
      animation: bounce 1s infinite ease-in-out;
    }

    .typing span:nth-child(2) {
      animation-delay: 0.12s;
    }

    .typing span:nth-child(3) {
      animation-delay: 0.24s;
    }

    svg {
      width: 22px;
      height: 22px;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    @keyframes bounce {
      0%,
      80%,
      100% {
        transform: translateY(0);
        opacity: 0.45;
      }

      40% {
        transform: translateY(-5px);
        opacity: 1;
      }
    }

    @keyframes pulse {
      0%,
      100% {
        box-shadow: 0 0 0 0 rgba(159, 74, 63, 0.2);
      }

      50% {
        box-shadow: 0 0 0 8px rgba(159, 74, 63, 0);
      }
    }

    @media (max-width: 720px) {
      .shell {
        padding: 0;
      }

      .chat {
        width: 100%;
        height: 100dvh;
        min-height: 100dvh;
        border: 0;
        border-radius: 0;
      }

      .topbar {
        padding: 16px;
      }

      .avatar {
        width: 42px;
        height: 42px;
        border-radius: 15px;
      }

      .name {
        font-size: 19px;
      }

      .subtitle {
        font-size: 13px;
      }

      .status {
        display: none;
      }

      .messages {
        padding: 20px 14px 14px;
      }

      .bubble {
        max-width: 88%;
        font-size: 15px;
      }

      .composer {
        padding: 12px 12px 14px;
      }

      .input-wrap {
        grid-template-columns: auto 1fr auto;
        gap: 8px;
        border-radius: 22px;
      }

      .icon-btn {
        width: 44px;
        height: 44px;
        border-radius: 16px;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="chat" aria-label="Chat_bot 對話頁面">
      <header class="topbar">
        <div class="identity">
          <div class="avatar" aria-hidden="true">C</div>
          <div>
            <h1 class="name">Chat_bot</h1>
            <p class="subtitle">溫柔陪伴、知識解答與日常對話</p>
          </div>
        </div>
        <div class="status" aria-live="polite"><span class="dot"></span><span id="statusText">在線</span></div>
      </header>

      <div id="messages" class="messages" aria-live="polite" aria-label="對話內容"></div>

      <footer class="composer">
        <div class="input-wrap">
          <button id="micButton" class="icon-btn" type="button" title="語音輸入" aria-label="語音輸入">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 3a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V6a3 3 0 0 0-3-3Z"></path>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
              <path d="M12 19v3"></path>
              <path d="M8 22h8"></path>
            </svg>
          </button>
      <textarea id="messageInput" rows="1" maxlength="1200" placeholder="親愛的，想聊什麼都可以告訴我。"></textarea>
          <button id="sendButton" class="icon-btn send" type="button" title="送出" aria-label="送出">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="m22 2-7 20-4-9-9-4Z"></path>
              <path d="M22 2 11 13"></path>
            </svg>
          </button>
        </div>
        <div id="note" class="note" role="status"></div>
      </footer>
    </section>
  </main>

  <script>
    const GAS_ENDPOINT = "https://script.google.com/macros/s/AKfycbxeK-gsjusOZhucailmzLhaSpaBuWhbv4HuSvUmRPETLa1tZCHggAWEqbsgqYdnxOXudA/exec";
    const messagesEl = document.getElementById("messages");
    const inputEl = document.getElementById("messageInput");
    const sendButton = document.getElementById("sendButton");
    const micButton = document.getElementById("micButton");
    const noteEl = document.getElementById("note");
    const statusText = document.getElementById("statusText");

    const state = {
      busy: false,
      sessionId: crypto.randomUUID ? crypto.randomUUID() : String(Date.now()),
      history: []
    };

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = SpeechRecognition ? new SpeechRecognition() : null;

    function pad(value) {
      return String(value).padStart(2, "0");
    }

    function formatDateTime(date) {
      return `${date.getFullYear()}/${pad(date.getMonth() + 1)}/${pad(date.getDate())} ${pad(date.getHours())}:${pad(date.getMinutes())}`;
    }

    function formatDate(date) {
      return `${date.getFullYear()}/${pad(date.getMonth() + 1)}/${pad(date.getDate())}`;
    }

    function cleanText(value) {
      return String(value || "")
        .replace(/```[\s\S]*?```/g, "")
        .replace(/[*_#>`~]/g, "")
        .trim();
    }

    function setNote(text, isError = false) {
      noteEl.textContent = text || "";
      noteEl.classList.toggle("error", Boolean(isError));
    }

    function autoResize() {
      inputEl.style.height = "auto";
      inputEl.style.height = `${Math.min(inputEl.scrollHeight, 150)}px`;
    }

    function addDayDivider() {
      if (messagesEl.querySelector(".day")) return;
      const day = document.createElement("div");
      day.className = "day";
      day.textContent = formatDate(new Date());
      messagesEl.appendChild(day);
    }

    function addMessage(role, text, date = new Date()) {
      addDayDivider();
      const row = document.createElement("div");
      row.className = `row ${role}`;

      const bubble = document.createElement("div");
      bubble.className = "bubble";

      const content = document.createElement("div");
      content.textContent = cleanText(text);

      const meta = document.createElement("div");
      meta.className = "meta";
      meta.textContent = formatDateTime(date);

      bubble.append(content, meta);
      row.appendChild(bubble);
      messagesEl.appendChild(row);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return row;
    }

    function addTyping() {
      const row = document.createElement("div");
      row.className = "row bot";
      row.dataset.typing = "true";
      const bubble = document.createElement("div");
      bubble.className = "bubble";
      const typing = document.createElement("div");
      typing.className = "typing";
      typing.setAttribute("aria-label", "Chat_bot 正在回覆");
      typing.innerHTML = "<span></span><span></span><span></span>";
      bubble.appendChild(typing);
      row.appendChild(bubble);
      messagesEl.appendChild(row);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return row;
    }

    function callGas(payload) {
      return new Promise((resolve, reject) => {
        const callbackName = `chatBotCallback_${Date.now()}_${Math.floor(Math.random() * 100000)}`;
        const script = document.createElement("script");
        const timer = window.setTimeout(() => {
          cleanup();
          reject(new Error("後台回應時間過長，請稍後再試。"));
        }, 45000);

        function cleanup() {
          window.clearTimeout(timer);
          delete window[callbackName];
          script.remove();
        }

        window[callbackName] = (data) => {
          cleanup();
          resolve(data);
        };

        script.onerror = () => {
          cleanup();
          reject(new Error("無法連線到 GAS 後台。"));
        };

        const query = new URLSearchParams({
          callback: callbackName,
          payload: JSON.stringify(payload)
        });
        script.src = `${GAS_ENDPOINT}?${query.toString()}`;
        document.body.appendChild(script);
      });
    }

    function setBusy(value) {
      state.busy = value;
      sendButton.disabled = value;
      inputEl.disabled = value;
      statusText.textContent = value ? "回覆中" : "在線";
    }

    async function sendMessage() {
      const message = inputEl.value.trim();
      if (!message || state.busy) return;

      inputEl.value = "";
      autoResize();
      setNote("");
      addMessage("user", message);
      state.history.push({ role: "user", content: message });
      setBusy(true);
      const typingRow = addTyping();

      try {
        const data = await callGas({
          action: "chat",
          sessionId: state.sessionId,
          message,
          history: state.history.slice(-12),
          clientTime: formatDateTime(new Date()),
          timezone: Intl.DateTimeFormat().resolvedOptions().timeZone || "Asia/Taipei"
        });

        if (data.status !== "success") {
          throw new Error(data.message || "Chat_bot 暫時無法回覆。");
        }

        const reply = cleanText(data.reply || data.data && data.data.reply || "");
        if (!reply) throw new Error("Chat_bot 的回覆是空白的。");

        typingRow.remove();
        addMessage("bot", reply);
        state.history.push({ role: "assistant", content: reply });
      } catch (error) {
        typingRow.remove();
        const fallback = "親愛的，我現在和後台連線有點不順。你先別急，我們把 GAS 後台設定好後，我就可以穩穩陪你聊天。";
        addMessage("bot", fallback);
        setNote(error.message, true);
      } finally {
        setBusy(false);
        inputEl.focus();
      }
    }

    if (recognition) {
      recognition.lang = "zh-TW";
      recognition.interimResults = true;
      recognition.continuous = false;

      recognition.onstart = () => {
        micButton.classList.add("recording");
        setNote("正在聆聽。");
      };

      recognition.onresult = (event) => {
        let transcript = "";
        for (let index = event.resultIndex; index < event.results.length; index += 1) {
          transcript += event.results[index][0].transcript;
        }
        inputEl.value = transcript.trim();
        autoResize();
      };

      recognition.onerror = () => {
        setNote("語音輸入暫時無法使用，請確認瀏覽器麥克風權限。", true);
      };

      recognition.onend = () => {
        micButton.classList.remove("recording");
        if (!noteEl.classList.contains("error")) setNote("");
      };

      micButton.addEventListener("click", () => recognition.start());
    } else {
      micButton.disabled = true;
      micButton.title = "此瀏覽器不支援語音輸入";
    }

    inputEl.addEventListener("input", autoResize);
    inputEl.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
      }
    });
    sendButton.addEventListener("click", sendMessage);

    addMessage("bot", "親愛的，我在這裡。今天想撒嬌、想笑一下、想問功課，或只是想被好好接住，都可以慢慢跟我說。");
    inputEl.focus();
  </script>
</body>
</html>
